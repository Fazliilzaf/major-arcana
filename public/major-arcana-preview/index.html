<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCO — Hair TP Clinic</title>
<meta http-equiv="refresh" content="0; url=/major-arcana-preview/">
<link rel="canonical" href="/major-arcana-preview/">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif; background: #fafaff; color: #4a4458; }
  .wrap { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 14px; }
  .logo { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #6c5ce7, #ec4899); box-shadow: 0 8px 24px rgba(108,92,231,0.30); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; font-weight: 800; }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #0a0612; margin: 0; }
  p { font-size: 13px; color: #8b8595; margin: 0; }
  a { color: #6c5ce7; text-decoration: none; font-weight: 600; }
  a:hover { text-decoration: underline; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, #06d6a0, #14b8c0); box-shadow: 0 0 0 3px rgba(6,214,160,0.20), 0 0 8px rgba(6,214,160,0.55); animation: p 1.6s ease-in-out infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
  @keyframes p { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="wrap">
  <span class="logo">✦</span>
  <h1>CCO — Hair TP Clinic</h1>
  <p><span class="pulse"></span>Tar dig till operatörspanelen…</p>
  <p style="font-size: 11px; margin-top: 8px;"><a href="/major-arcana-preview/">Klicka här om sidan inte laddar</a></p>
</div>
<script>
  // Belt-and-suspenders: JS redirect om meta-refresh är blockerat
  (function () {
    try {
      var target = '/major-arcana-preview/' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(target);
    } catch (e) {
      window.location.href = '/major-arcana-preview/';
    }
  })();
</script>
</body>
</html>
