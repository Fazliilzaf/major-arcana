<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCO — Hair TP Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-1: #fdfaff;
  --bg-2: #f6f0ff;
  --bg-3: #fef0f6;
  --bg-4: #ecf3ff;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-solid: #ffffff;
  --surface-2: rgba(255, 255, 255, 0.55);
  --surface-3: rgba(247, 245, 252, 0.85);
  --line: rgba(20, 18, 32, 0.08);
  --line-2: rgba(20, 18, 32, 0.14);
  --text: #0a0612;
  --text-2: #4a4458;
  --text-3: #8b8595;
  --accent: #6c5ce7;
  --accent-2: #5848d6;
  --accent-soft: rgba(108, 92, 231, 0.08);
  --accent-glow: rgba(108, 92, 231, 0.32);
  --accent-grad: linear-gradient(135deg, #6c5ce7 0%, #ec4899 100%);
  --ai-grad: linear-gradient(135deg, #ff6b9d 0%, #ffd166 50%, #06d6a0 100%);
  --red: #ef4458;
  --orange: #ff8a3d;
  --yellow: #f5b400;
  --green: #1aa86c;
  --teal: #14b8c0;
  --pink: #ec4899;
  --purple: #8b5cf6;
  --indigo: #6366f1;
  --font-sans: "Inter", -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
  --shadow-xs: 0 1px 2px rgba(20, 18, 32, 0.04);
  --shadow-sm: 0 1px 3px rgba(20, 18, 32, 0.05), 0 4px 8px -2px rgba(20, 18, 32, 0.06);
  --shadow-md: 0 2px 4px rgba(20, 18, 32, 0.06), 0 12px 24px -4px rgba(20, 18, 32, 0.10);
  --shadow-lg: 0 8px 16px rgba(20, 18, 32, 0.08), 0 24px 56px -8px rgba(20, 18, 32, 0.16);
  --shadow-glow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 8px 20px rgba(108, 92, 231, 0.20);
  --blur: saturate(180%) blur(20px);
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg-1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  letter-spacing: -0.011em;
  position: relative;
}

/* Decorative gradient orbs in background (iOS 18 wallpaper feel) */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.6;
  z-index: -1;
  pointer-events: none;
}
body::before {
  width: 480px; height: 480px;
  background: radial-gradient(circle, rgba(236, 72, 153, 0.4) 0%, transparent 70%);
  top: -100px; left: -100px;
  animation: orbDrift 18s ease-in-out infinite;
}
body::after {
  width: 540px; height: 540px;
  background: radial-gradient(circle, rgba(108, 92, 231, 0.32) 0%, transparent 70%);
  bottom: -120px; right: -120px;
  animation: orbDrift 22s ease-in-out infinite reverse;
}
.orb-3 {
  position: fixed; width: 380px; height: 380px; border-radius: 50%;
  background: radial-gradient(circle, rgba(76, 201, 240, 0.25) 0%, transparent 70%);
  filter: blur(80px);
  top: 35%; left: 45%;
  z-index: -1;
  pointer-events: none;
  animation: orbDrift 26s ease-in-out infinite;
}
@keyframes orbDrift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(60px, -40px) scale(1.08); }
  66% { transform: translate(-40px, 50px) scale(0.95); }
}

button, input, select { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: 0; }
button { cursor: pointer; }
::selection { background: var(--accent-soft); color: var(--accent-2); }

.app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; position: relative; z-index: 1; }

/* ===== Top bar ===== */
.topbar {
  display: grid;
  grid-template-columns: 240px 1fr 320px;
  align-items: center;
  padding: 0 14px;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--line);
  gap: 16px;
  position: relative; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14.5px; letter-spacing: -0.3px; }
.brand .logo {
  width: 30px; height: 30px; border-radius: 9px;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: 0 8px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
}
.brand .logo::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 100%);
  pointer-events: none;
}
.brand .logo svg { width: 16px; height: 16px; position: relative; z-index: 1; }
.brand .sep { color: var(--text-3); margin: 0 2px; font-weight: 400; }
.brand .ctx { color: var(--text-2); font-weight: 500; font-size: 12.5px; }

.search { position: relative; max-width: 480px; margin: 0 auto; width: 100%; }
.search input {
  width: 100%; height: 34px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 0 14px 0 38px;
  color: var(--text);
  font-size: 13px; outline: none;
  transition: all 0.2s var(--ease);
}
.search input::placeholder { color: var(--text-3); }
.search input:focus { background: var(--surface-solid); border-color: var(--accent); box-shadow: var(--shadow-glow); }
.search .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; display: flex; }
.search kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-sans); font-size: 10px; color: var(--text-3);
  background: rgba(255, 255, 255, 0.85); padding: 2px 6px; border-radius: 5px;
  border: 1px solid var(--line); font-weight: 500;
}

.topbar-actions { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.2s var(--ease);
}
.icon-btn:hover { background: rgba(255,255,255,0.8); color: var(--text); transform: scale(1.05); }
.status-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 30px; border-radius: 999px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border: 1px solid var(--line);
  font-size: 11.5px; color: var(--text-2); font-weight: 600;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(26, 168, 108, 0.18), 0 0 12px var(--green);
  animation: pulse 2.4s ease-in-out infinite;
}
.status-dot.demo { background: var(--yellow); box-shadow: 0 0 0 3px rgba(245, 180, 0, 0.18), 0 0 12px rgba(245, 180, 0, 0.5); }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.85); opacity: 0.7; } }

.compose-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 14px; height: 32px; border-radius: 10px;
  background: var(--accent-grad); color: #fff;
  font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
  transition: all 0.2s var(--ease);
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.25);
  position: relative; overflow: hidden;
}
.compose-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent); pointer-events: none; }
.compose-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.40); }
.compose-btn svg { width: 14px; height: 14px; }

/* ===== Body ===== */
.body { display: grid; grid-template-columns: 232px 1fr; overflow: hidden; padding: 12px; gap: 12px; position: relative; z-index: 1; }

/* ===== Sidebar ===== */
.sidebar {
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--line);
  border-radius: 16px;
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 12px;
  gap: 14px;
  box-shadow: var(--shadow-sm);
}
.sidebar-section + .sidebar-section { padding-top: 12px; border-top: 1px solid var(--line); }
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  color: var(--text-3); text-transform: uppercase;
  padding: 0 8px 8px; display: flex; justify-content: space-between; align-items: center;
}
.sidebar-label .add {
  width: 18px; height: 18px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px;
}
.sidebar-label .add:hover { background: var(--surface-2); color: var(--text); }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 9px; border-radius: 9px;
  color: var(--text-2);
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  width: 100%; text-align: left;
  letter-spacing: -0.01em;
}
.nav-item:hover { background: rgba(255,255,255,0.7); color: var(--text); transform: translateX(2px); }
.nav-item.active {
  background: var(--accent-grad); color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.2);
}
.nav-item.active .count { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item .ico {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--ico-bg, rgba(108, 92, 231, 0.10));
  color: var(--ico-color, var(--accent));
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s var(--ease);
}
.nav-item.active .ico { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item .ico svg { width: 14px; height: 14px; }
.nav-item .label { flex: 1; }
.nav-item .count {
  font-size: 10.5px; color: var(--text-3); font-weight: 700;
  font-variant-numeric: tabular-nums;
  background: rgba(20, 18, 32, 0.05);
  padding: 1px 7px; border-radius: 6px;
  min-width: 24px; text-align: center;
}
.nav-item .dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6), 0 2px 6px var(--dot-glow, rgba(0,0,0,0.1));
}

/* Lane icon colors */
.nav-item[data-ico="inbox"] { --ico-bg: rgba(108, 92, 231, 0.10); --ico-color: var(--accent); }
.nav-item[data-ico="act-now"] { --ico-bg: rgba(239, 68, 88, 0.12); --ico-color: var(--red); }
.nav-item[data-ico="sprint"] { --ico-bg: rgba(26, 168, 108, 0.12); --ico-color: var(--green); }
.nav-item[data-ico="bookable"] { --ico-bg: rgba(20, 184, 192, 0.12); --ico-color: var(--teal); }
.nav-item[data-ico="review"] { --ico-bg: rgba(255, 138, 61, 0.14); --ico-color: var(--orange); }
.nav-item[data-ico="later"] { --ico-bg: rgba(139, 92, 246, 0.12); --ico-color: var(--purple); }
.nav-item[data-ico="done"] { --ico-bg: rgba(20, 18, 32, 0.06); --ico-color: var(--text-2); }
.nav-item[data-ico="users"] { --ico-bg: rgba(76, 201, 240, 0.12); --ico-color: var(--teal); }
.nav-item[data-ico="auto"] { --ico-bg: rgba(245, 180, 0, 0.14); --ico-color: var(--yellow); }
.nav-item[data-ico="chart"] { --ico-bg: rgba(99, 102, 241, 0.12); --ico-color: var(--indigo); }
.nav-item[data-ico="templates"] { --ico-bg: rgba(236, 72, 153, 0.12); --ico-color: var(--pink); }

/* ===== Workspace (inbox + thread) ===== */
.workspace {
  display: grid;
  grid-template-columns: 380px 1fr;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

/* ===== Inbox list ===== */
.inbox-list { border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; background: rgba(255,255,255,0.32); }
.inbox-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 5;
  display: flex; flex-direction: column; gap: 12px;
}
.inbox-title-row { display: flex; align-items: center; gap: 10px; }
.inbox-title-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--accent-grad); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 10px var(--accent-glow);
}
.inbox-title-icon svg { width: 16px; height: 16px; }
.inbox-title-text h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
.inbox-title-text .num { color: var(--text-3); font-weight: 500; font-size: 11.5px; letter-spacing: 0; }

.inbox-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab {
  padding: 5px 11px; border-radius: 8px;
  font-size: 11.5px; font-weight: 600;
  background: transparent; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer; transition: all 0.2s var(--ease);
  letter-spacing: -0.01em;
}
.tab:hover { background: rgba(255,255,255,0.7); color: var(--text); }
.tab.active { background: var(--text); color: var(--surface-solid); box-shadow: 0 2px 8px rgba(20, 18, 32, 0.20); }
.tab .num { opacity: 0.55; font-weight: 500; }
.tab.active .num { opacity: 0.75; }
.tab.active.danger { background: var(--red); }
.tab.active.warn { background: var(--orange); }

.inbox-rows { flex: 1; overflow-y: auto; padding: 6px; }
.row {
  display: grid;
  grid-template-columns: 38px 1fr;
  gap: 10px;
  padding: 11px 14px 11px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  position: relative;
  background: transparent;
  margin-bottom: 3px;
}
.row:hover { background: rgba(255,255,255,0.85); transform: translateY(-1px); box-shadow: var(--shadow-xs); }
.row.selected { background: var(--surface-solid); box-shadow: var(--shadow-md); }
.row.selected::before {
  content: ''; position: absolute; left: -2px; top: 14%; bottom: 14%; width: 4px;
  background: var(--accent-grad); border-radius: 0 4px 4px 0;
  box-shadow: 0 0 12px var(--accent-glow);
}

.row .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
  letter-spacing: -0.3px; flex-shrink: 0;
  box-shadow: 0 2px 8px var(--avatar-glow, var(--accent-glow));
  position: relative;
}
.row .avatar .lane-badge {
  position: absolute; bottom: -2px; right: -2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--lane-color, var(--accent));
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid var(--surface-solid);
  color: #fff;
}
.row .avatar .lane-badge svg { width: 9px; height: 9px; }

.row .body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.row .top { display: flex; align-items: center; gap: 6px; min-width: 0; }
.row .who {
  font-size: 13.5px; font-weight: 700; letter-spacing: -0.2px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
  display: flex; align-items: center; gap: 6px;
}
.row.unread .who::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent-grad); flex-shrink: 0;
  box-shadow: 0 0 8px var(--accent-glow);
}
.row .meta-time {
  font-size: 10.5px; color: var(--text-3);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
  font-family: var(--font-mono); font-weight: 500;
}
.row .subject {
  font-size: 12.5px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 500;
}
.row.unread .subject { color: var(--text); }
.row .preview {
  font-size: 11.5px; color: var(--text-3);
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.row .footer { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.tag {
  font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 5px;
  background: var(--surface-3); color: var(--text-2);
  display: inline-flex; align-items: center; gap: 4px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.tag svg { width: 9px; height: 9px; }
.tag.danger { background: rgba(239, 68, 88, 0.10); color: var(--red); }
.tag.warn { background: rgba(255, 138, 61, 0.12); color: var(--orange); }
.tag.info { background: rgba(20, 184, 192, 0.12); color: var(--teal); }
.tag.success { background: rgba(26, 168, 108, 0.10); color: var(--green); }
.tag.ai { background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(6,214,160,0.12)); color: var(--pink); position: relative; }
.row .mailbox-trail { display: inline-flex; gap: 0; margin-left: auto; }
.row .mailbox-trail .mb {
  width: 17px; height: 17px; border-radius: 50%;
  color: #fff; font-size: 9px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid #fff; margin-left: -5px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.10);
}

/* Lane styling */
.row[data-lane="act-now"] { --lane-color: var(--red); --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.32); }
.row[data-lane="sprint"] { --lane-color: var(--green); --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.row[data-lane="bookable"] { --lane-color: var(--teal); --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.row[data-lane="review"] { --lane-color: var(--orange); --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.row[data-lane="unclear"] { --lane-color: var(--yellow); --avatar-grad: linear-gradient(135deg,#f5b400,#ffd166); --avatar-glow: rgba(245,180,0,0.28); }
.row[data-lane="later"] { --lane-color: var(--purple); --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

/* ===== Thread ===== */
.thread { display: flex; flex-direction: column; overflow: hidden; background: rgba(255,255,255,0.45); }
.thread.empty { display: flex; align-items: center; justify-content: center; padding: 60px; }
.thread.empty .placeholder { text-align: center; color: var(--text-3); max-width: 360px; }
.thread.empty .empty-illustration {
  width: 120px; height: 120px; margin: 0 auto 20px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-grad); border-radius: 28px;
  color: #fff;
  box-shadow: 0 12px 30px var(--accent-glow);
  animation: floatY 3.5s ease-in-out infinite;
}
.thread.empty .empty-illustration svg { width: 56px; height: 56px; }
@keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.thread.empty h3 { font-size: 22px; font-weight: 800; letter-spacing: -0.6px; color: var(--text); margin-bottom: 8px; }
.thread.empty p { font-size: 13.5px; line-height: 1.6; color: var(--text-2); }
.thread.empty .key {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  background: var(--surface-solid); border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  margin: 0 2px; font-weight: 600;
}

.thread-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 5;
}
.thread-head .top { display: flex; gap: 14px; align-items: flex-start; }
.thread-head .top h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.6px; flex: 1; line-height: 1.25; }
.thread-head .lane-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 8px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--lane-color); background: var(--lane-bg);
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid color-mix(in srgb, var(--lane-color) 25%, transparent);
}
.thread-head .lane-pill svg { width: 10px; height: 10px; }
.thread-head .who-line { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); flex-wrap: wrap; }
.thread-head .ava {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 6px var(--avatar-glow, var(--accent-glow));
}
.thread-head .who-line strong { color: var(--text); font-weight: 700; font-size: 13px; }
.thread-head .who-line .email { color: var(--text-3); font-family: var(--font-mono); font-size: 11px; }
.thread-head .who-line .meta-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; background: rgba(255,255,255,0.7); font-size: 11px; }
.thread-head .who-line .meta-chip svg { width: 10px; height: 10px; color: var(--text-3); }

/* Lane bgs */
.lane-act-now { --lane-color: var(--red); --lane-bg: rgba(239, 68, 88, 0.10); --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.32); }
.lane-sprint { --lane-color: var(--green); --lane-bg: rgba(26, 168, 108, 0.10); --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.lane-bookable { --lane-color: var(--teal); --lane-bg: rgba(20, 184, 192, 0.10); --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.lane-review { --lane-color: var(--orange); --lane-bg: rgba(255, 138, 61, 0.12); --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.lane-unclear { --lane-color: var(--yellow); --lane-bg: rgba(245, 180, 0, 0.14); }
.lane-later { --lane-color: var(--purple); --lane-bg: rgba(139, 92, 246, 0.10); --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

.thread-actions {
  padding: 10px 22px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 6px; flex-wrap: wrap;
  background: rgba(255,255,255,0.45);
}
.action {
  height: 32px; padding: 0 12px; border-radius: 9px;
  background: rgba(255,255,255,0.75); border: 1px solid var(--line);
  font-size: 12px; font-weight: 600; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.2s var(--ease);
  letter-spacing: -0.01em;
  backdrop-filter: blur(6px);
}
.action svg { width: 13px; height: 13px; }
.action:hover { background: var(--surface-solid); color: var(--text); border-color: var(--line-2); transform: translateY(-1px); box-shadow: var(--shadow-xs); }
.action.primary {
  background: var(--accent-grad); color: #fff; border-color: transparent;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.20);
}
.action.primary:hover { box-shadow: 0 8px 20px rgba(108, 92, 231, 0.40); transform: translateY(-1px); }
.action.danger:hover { color: var(--red); border-color: rgba(239, 68, 88, 0.3); }

.thread-body {
  flex: 1; overflow-y: auto;
  padding: 18px 22px;
  display: grid; grid-template-columns: 1fr 280px; gap: 20px;
  align-items: start;
}
@media (max-width: 1180px) {
  .thread-body { grid-template-columns: 1fr; }
  .thread-body .ctx { display: none; }
}

.messages { display: flex; flex-direction: column; gap: 12px; }
.msg {
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface-solid);
  box-shadow: var(--shadow-xs);
  animation: msgIn 0.4s var(--ease) backwards;
}
.msg:nth-child(1) { animation-delay: 0.05s; }
.msg:nth-child(2) { animation-delay: 0.15s; }
.msg:nth-child(3) { animation-delay: 0.25s; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-head {
  padding: 11px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(247,245,252,0.55));
}
.msg-head .left { display: flex; align-items: center; gap: 10px; }
.msg-head .ava {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface-3); color: var(--text-2);
  font-size: 10.5px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.msg.outbound .msg-head .ava { background: var(--accent-grad); color: #fff; box-shadow: 0 2px 6px var(--accent-glow); }
.msg.draft .msg-head .ava { background: var(--ai-grad); color: #fff; box-shadow: 0 2px 8px rgba(255,107,157,0.35); }
.msg-head .from { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.15px; }
.msg-head .time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-weight: 500; }
.msg-head .badge {
  padding: 2px 8px; border-radius: 5px;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 4px;
}
.msg-head .badge svg { width: 9px; height: 9px; }
.msg.outbound .msg-head .badge { background: rgba(26, 168, 108, 0.12); color: var(--green); }
.msg.inbound .msg-head .badge { background: rgba(20, 18, 32, 0.06); color: var(--text-2); }
.msg.draft .msg-head .badge {
  background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,209,102,0.12), rgba(6,214,160,0.12));
  color: var(--pink);
  position: relative;
}
.msg.draft { border-color: rgba(255, 107, 157, 0.25); position: relative; }
.msg.draft::before {
  content: ''; position: absolute; left: 0; right: 0; top: 0; height: 2px;
  background: var(--ai-grad);
  background-size: 200% 100%;
  animation: aiShimmer 3s linear infinite;
}
@keyframes aiShimmer { from { background-position: 0 0; } to { background-position: -200% 0; } }
.msg-body { padding: 14px 18px; font-size: 13.5px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }

/* ===== Context ===== */
.ctx { display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; }
.ctx-card {
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-solid);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  animation: msgIn 0.4s var(--ease) backwards;
}
.ctx-card:nth-child(1) { animation-delay: 0.30s; }
.ctx-card:nth-child(2) { animation-delay: 0.35s; }
.ctx-card:nth-child(3) { animation-delay: 0.40s; }
.ctx-card:nth-child(4) { animation-delay: 0.45s; }
.ctx-card:nth-child(5) { animation-delay: 0.50s; }
.ctx-card .head {
  padding: 9px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 9.5px; font-weight: 800; letter-spacing: 1px; color: var(--text-3);
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.ctx-card .head .ico { display: inline-flex; align-items: center; gap: 6px; }
.ctx-card .head svg { width: 12px; height: 12px; }
.ctx-card .body { padding: 14px; }

/* Identity card with decorative pattern */
.ctx-card.identity-card { background: linear-gradient(135deg, var(--surface-solid) 0%, rgba(247,245,252,0.95) 100%); position: relative; overflow: hidden; }
.ctx-card.identity-card::before {
  content: ''; position: absolute; right: -40px; top: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
  pointer-events: none;
}
.identity { display: flex; gap: 12px; align-items: center; position: relative; }
.identity .ava {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff;
  flex-shrink: 0; letter-spacing: -0.3px;
  box-shadow: 0 6px 16px var(--avatar-glow, var(--accent-glow)), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative; overflow: hidden;
}
.identity .ava::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.20) 100%);
  pointer-events: none;
}
.identity .who-name { font-size: 14.5px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.identity .email-line { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); font-weight: 400; }

/* Status card with icon-prefixed grid items */
.ctx-card .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ctx-card .item { display: flex; flex-direction: column; gap: 3px; }
.ctx-card .item .label-row { display: flex; align-items: center; gap: 5px; }
.ctx-card .item .label-row svg { width: 10px; height: 10px; color: var(--text-3); }
.ctx-card .item .label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.7px; text-transform: uppercase; font-weight: 800; }
.ctx-card .item .val { font-size: 12.5px; color: var(--text); font-weight: 700; letter-spacing: -0.1px; }

/* Risk + Next gradient cards */
.ctx-card.risk { background: linear-gradient(180deg, rgba(255, 138, 61, 0.08) 0%, var(--surface-solid) 100%); border-color: rgba(255, 138, 61, 0.3); }
.ctx-card.risk .head { color: var(--orange); }
.ctx-card.next { background: linear-gradient(180deg, rgba(26, 168, 108, 0.08) 0%, var(--surface-solid) 100%); border-color: rgba(26, 168, 108, 0.3); }
.ctx-card.next .head { color: var(--green); }
.ctx-card .text { font-size: 12.5px; line-height: 1.55; color: var(--text); }

/* Timeline with vertical line */
.timeline { list-style: none; position: relative; padding-left: 8px; }
.timeline::before {
  content: ''; position: absolute; left: 17px; top: 14px; bottom: 14px;
  width: 1.5px;
  background: linear-gradient(180deg, var(--accent), var(--line) 60%);
}
.timeline li {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 7px 0;
  font-size: 12px;
  color: var(--text-2);
  position: relative;
}
.timeline .num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface-solid); color: var(--text-2);
  font-size: 10px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1.5px solid var(--line);
  z-index: 1;
}
.timeline li:first-child .num {
  background: var(--accent-grad); color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* Mini chart in stat card */
.mini-chart { display: flex; gap: 3px; align-items: end; height: 24px; margin-top: 4px; }
.mini-chart .bar {
  flex: 1; background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
  border-radius: 2px;
  min-height: 3px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 1280px) { .body { grid-template-columns: 200px 1fr; } }
@media (max-width: 1000px) { .workspace { grid-template-columns: 320px 1fr; } }
@media (max-width: 800px) {
  .body { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .workspace { grid-template-columns: 1fr; }
}
</style>
</head>

    if (state.tab==='high-risk') v = v.filter(t=>(t.tags||[]).some(g=>g.tone==='danger'));
    if (state.tab==='today') v = v.filter(t=>/Idag/i.test(t.time));
    return v;

  function bind() {
    document.addEventListener('click', ev=>{
      const tab = ev.target.closest('[data-tab]');
      if (tab) { state.tab = tab.dataset.tab; renderTabs(); renderRows(); return; }
      const row = ev.target.closest('.row[data-id]');
      if (row) { state.selectedId = row.dataset.id; renderRows(); renderThread(); return; }
    });
    document.addEventListener('keydown', ev=>{
      if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if (ev.metaKey && ev.key==='k') { ev.preventDefault(); $('#search-input').focus(); return; }
      const v = visibleThreads();
      const idx = v.findIndex(t=>t.id===state.selectedId);
      if (ev.key==='j'||ev.key==='ArrowDown') { ev.preventDefault(); const n=v[Math.min(v.length-1,idx+1)]||v[0]; if(n){state.selectedId=n.id;renderRows();renderThread();} }
      else if (ev.key==='k'||ev.key==='ArrowUp') { ev.preventDefault(); const p=v[Math.max(0,idx-1)]||v[0]; if(p){state.selectedId=p.id;renderRows();renderThread();} }
    });
  }

  async function tryLoadLive() {
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok) return false;
      const r = await fetch('/api/v1/cco/runtime/worklist/consumer?limit=50', { headers:{Authorization:'Bearer '+tok} });
      if (!r.ok) return false;
      const j = await r.json();
      if (!j.ok || !Array.isArray(j.rows) || j.rows.length===0) return false;
      state.threads = j.rows.map(mapApiRow);
      state.selectedId = state.threads[0]?.id;
      state.live = true;
      const status = $('#conn-status');
      status.innerHTML = `<span class="status-dot"></span> Live · ${state.threads.length}`;
      return true;
    } catch (e) { return false; }
  }
  function mapApiRow(row) {
    const laneRaw = String(row.lane||'').toLowerCase().replace(/_/g,'-');
    const lane = ['act-now','sprint','bookable','review','unclear','later','medical'].includes(laneRaw)?laneRaw:'unclear';
    const laneIconMap = {'act-now':'i-bolt','sprint':'i-trend','bookable':'i-calendar','review':'i-eye','unclear':'i-question','later':'i-pause','medical':'i-flame'};
    const who = row.customerName || row.customerEmail?.split('@')[0] || 'Okänd';
    const initials = who.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
    return {
      id: row.conversationKey||row.mailboxConversationId,
      lane, laneIcon: laneIconMap[lane]||'i-circle-dot',
      laneLabel: lane==='act-now'?'Agera nu':lane[0].toUpperCase()+lane.slice(1),
      unread: row.hasUnreadInbound===true, who, email: row.customerEmail||'', initials,
      mailbox: row.mailboxAddress?.split('@')[0]||'Inkorg', mailboxTrail:[],
      subject: row.subject||'(utan ämne)', preview: row.latestPreview||'',
      time: row.lastInboundAt?new Date(row.lastInboundAt).toLocaleString('sv',{hour:'2-digit',minute:'2-digit'}):'',
      tags:[], conversation:[{from:who,dir:'inbound',time:row.lastInboundAt||'',initials,body:row.latestPreview||''}],
      timeline:[], risk:'', nextStep: row.hasUnreadInbound?'Svara nu':'Granska tråden',
      lifecycle: row.hasUnreadInbound?'Olast':'Aktiv', followUp:'—',
      riskLevel: row.hoursSinceInbound>24?'Hög':'Låg', owner: row.ownershipMailbox?.split('@')[0]||'—',
    };
  }

  async function init() { bind(); await tryLoadLive(); renderAll(); }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>

</html>
