<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCO — Hair TP Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fbfbfd;
  --bg-soft: #f4f3f7;
  --bg-hover: #f0eff4;
  --surface: #ffffff;
  --line: rgba(20, 18, 32, 0.07);
  --line-2: rgba(20, 18, 32, 0.12);
  --text: #0a0612;
  --text-2: #4a4458;
  --text-3: #8b8595;
  --accent: #6c5ce7;
  --accent-2: #5848d6;
  --accent-soft: rgba(108, 92, 231, 0.10);
  --accent-glow: rgba(108, 92, 231, 0.30);
  --accent-grad: linear-gradient(135deg, #6c5ce7 0%, #ec4899 100%);
  --ai-grad: linear-gradient(135deg, #ff6b9d 0%, #ffd166 50%, #06d6a0 100%);
  --red: #ef4458;
  --orange: #ff8a3d;
  --yellow: #f5b400;
  --green: #1aa86c;
  --teal: #14b8c0;
  --pink: #ec4899;
  --purple: #8b5cf6;
  --indigo: #6366f1;
  --font-sans: "Inter", -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
  --shadow-xs: 0 1px 2px rgba(20, 18, 32, 0.05);
  --shadow-sm: 0 1px 3px rgba(20, 18, 32, 0.06), 0 6px 14px -4px rgba(20, 18, 32, 0.08);
  --shadow-glow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 8px 20px rgba(108, 92, 231, 0.20);
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 12.5px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  letter-spacing: -0.011em;
}
button, input, select { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: 0; }
button { cursor: pointer; }
::selection { background: var(--accent-soft); color: var(--accent-2); }

.app { display: grid; grid-template-rows: 44px 1fr; height: 100vh; }

/* ===== Top bar ===== */
.topbar {
  display: grid;
  grid-template-columns: 200px 1fr 280px;
  align-items: center;
  padding: 0 14px;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--line);
  gap: 16px;
  position: relative; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; letter-spacing: -0.3px; }
.brand .logo {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative; overflow: hidden;
}
.brand .logo svg { width: 13px; height: 13px; }
.brand .sep { color: var(--text-3); margin: 0 2px; font-weight: 400; }
.brand .ctx { color: var(--text-2); font-weight: 500; font-size: 12px; }

.search { position: relative; max-width: 480px; margin: 0 auto; width: 100%; }
.search input {
  width: 100%; height: 28px;
  background: var(--bg-soft);
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 0 12px 0 32px;
  color: var(--text);
  font-size: 12.5px; outline: none;
  transition: all 0.2s var(--ease);
}
.search input::placeholder { color: var(--text-3); }
.search input:focus { background: var(--surface); border-color: var(--accent); box-shadow: var(--shadow-glow); }
.search .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; display: flex; }
.search kbd {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-sans); font-size: 9.5px; color: var(--text-3);
  background: var(--surface); padding: 1px 5px; border-radius: 4px;
  border: 1px solid var(--line); font-weight: 500;
}

.topbar-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.icon-btn {
  width: 26px; height: 26px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.15s var(--ease);
}
.icon-btn:hover { background: var(--bg-soft); color: var(--text); }
.status-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 10px; height: 24px; border-radius: 999px;
  background: var(--bg-soft);
  font-size: 11px; color: var(--text-2); font-weight: 600;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(26, 168, 108, 0.18);
  animation: pulse 2.4s ease-in-out infinite;
}
.status-dot.demo { background: var(--yellow); box-shadow: 0 0 0 3px rgba(245, 180, 0, 0.18); }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.85); opacity: 0.7; } }

.compose-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 26px; border-radius: 8px;
  background: var(--accent-grad); color: #fff;
  font-size: 12px; font-weight: 600; letter-spacing: -0.01em;
  transition: all 0.2s var(--ease);
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
}
.compose-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35); }
.compose-btn svg { width: 14px; height: 14px; }

/* ===== Body — flat 4-column layout, NO nested cards ===== */
.body {
  display: grid;
  grid-template-columns: 200px 340px 1fr 264px;
  overflow: hidden;
}

/* ===== Sidebar (just a list, no card) ===== */
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 10px 8px 10px;
  min-height: 0;
}
.sidebar-section + .sidebar-section { margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--line); }
.sidebar-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 1.1px;
  color: var(--text-3); text-transform: uppercase;
  padding: 0 8px 6px; display: flex; justify-content: space-between; align-items: center;
}
.sidebar-label .add {
  width: 18px; height: 18px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px;
}
.sidebar-label .add:hover { background: var(--bg-soft); color: var(--text); }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 8px; border-radius: 7px;
  color: var(--text-2);
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s var(--ease);
  width: 100%; text-align: left;
  letter-spacing: -0.01em;
}
.nav-item:hover { background: var(--bg-soft); color: var(--text); }
.nav-item.active {
  background: var(--accent-grad); color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 14px rgba(108, 92, 231, 0.30);
}
.nav-item.active .count { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item.active .ico { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item .ico {
  width: 20px; height: 20px; border-radius: 5px;
  background: var(--ico-bg, transparent);
  color: var(--ico-color, var(--text-3));
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s var(--ease);
}
.nav-item .ico svg { width: 12px; height: 12px; }
.nav-item .label { flex: 1; }
.nav-item .count {
  font-size: 10.5px; color: var(--text-3); font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.nav-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px var(--bg); }

/* ===== Min-dag mini-stats (top of sidebar) ===== */
.today-stats {
  margin: 0 4px 10px;
  padding: 10px 12px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(108, 92, 231, 0.06) 0%, rgba(236, 72, 153, 0.04) 100%);
  border: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
  overflow: hidden;
  cursor: default;
  flex-shrink: 0;
}
.sidebar-section { flex-shrink: 0; }
.presence-block { flex-shrink: 0; }
.today-stats::before {
  content: ''; position: absolute; right: -20px; top: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle, rgba(108, 92, 231, 0.10) 0%, transparent 70%);
  pointer-events: none;
}
.today-stats .label-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-3); text-transform: uppercase;
}
.today-stats .label-row .alert-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent-grad);
  box-shadow: 0 0 0 3px var(--accent-soft), 0 0 8px var(--accent-glow);
  animation: pulse 1.8s ease-in-out infinite;
}
.today-stats .stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.today-stats .stat {
  display: flex; flex-direction: column; gap: 1px;
  position: relative;
}
.today-stats .stat .num {
  font-size: 17px; font-weight: 800; letter-spacing: -0.5px; line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.today-stats .stat .lbl {
  font-size: 9.5px; color: var(--text-3); font-weight: 600; letter-spacing: -0.01em;
}
.today-stats .stat.urgent .num { background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

/* ===== Mailbox bars (replaces simple dots) ===== */
.nav-item.mailbox { gap: 8px; }
.nav-item.mailbox .mb-bar-wrap {
  display: flex; align-items: center; gap: 7px;
  flex: 1; min-width: 0;
}
.nav-item.mailbox .mb-color {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--bg);
}
.nav-item.mailbox .mb-label {
  font-size: 12.5px; flex-shrink: 0;
}
.nav-item.mailbox .mb-bar {
  flex: 1; min-width: 12px;
  height: 4px; border-radius: 2px;
  background: var(--bg-soft);
  position: relative;
  overflow: hidden;
}
.nav-item.mailbox .mb-bar .fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--mb-color, var(--text-3));
  border-radius: 2px;
  transition: width 0.4s var(--ease);
}
.nav-item.mailbox.active .mb-bar { background: rgba(255,255,255,0.25); }
.nav-item.mailbox.active .mb-bar .fill { background: rgba(255,255,255,0.85); }
.nav-item.mailbox .mb-num {
  font-size: 10.5px; color: var(--text-3); font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 16px; text-align: right;
}
.nav-item.mailbox.active .mb-num { color: rgba(255,255,255,0.85); }

/* ===== Presence block (bottom of sidebar) ===== */
.sidebar-spacer { flex: 1; min-height: 12px; }
.presence-block {
  margin: 0 4px;
  padding: 8px 10px;
  border-radius: 10px;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  display: flex; align-items: center; gap: 9px;
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.presence-block:hover { background: var(--surface); border-color: var(--line-2); }
.presence-block .pres-ava {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent-grad); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  box-shadow: 0 2px 6px var(--accent-glow);
  flex-shrink: 0; position: relative;
}
.presence-block .pres-ava .pres-status {
  position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg-soft);
  box-shadow: 0 0 6px rgba(26, 168, 108, 0.5);
}
.presence-block .pres-ava .pres-status.away { background: var(--yellow); box-shadow: 0 0 6px rgba(245, 180, 0, 0.5); }
.presence-block .pres-ava .pres-status.dnd { background: var(--red); box-shadow: 0 0 6px rgba(239, 68, 88, 0.5); }
.presence-block .pres-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.presence-block .pres-name { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: -0.15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.presence-block .pres-state { font-size: 10px; color: var(--text-3); font-weight: 500; display: flex; align-items: center; gap: 4px; }
.presence-block .pres-chevron { color: var(--text-3); flex-shrink: 0; }
.presence-block .pres-chevron svg { width: 12px; height: 12px; }

.kbd-hint {
  font-size: 9px; color: var(--text-3); font-weight: 600;
  font-family: var(--font-sans);
  background: var(--surface); border: 1px solid var(--line);
  padding: 1px 4px; border-radius: 3px;
  margin-left: auto;
}
.nav-item.active .kbd-hint { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); border-color: transparent; }

.nav-item[data-ico="inbox"] { --ico-color: var(--accent); }
.nav-item[data-ico="act-now"] { --ico-color: var(--red); }
.nav-item[data-ico="sprint"] { --ico-color: var(--green); }
.nav-item[data-ico="bookable"] { --ico-color: var(--teal); }
.nav-item[data-ico="review"] { --ico-color: var(--orange); }
.nav-item[data-ico="later"] { --ico-color: var(--purple); }
.nav-item[data-ico="done"] { --ico-color: var(--text-2); }
.nav-item[data-ico="users"] { --ico-color: var(--teal); }
.nav-item[data-ico="auto"] { --ico-color: var(--yellow); }
.nav-item[data-ico="chart"] { --ico-color: var(--indigo); }
.nav-item[data-ico="templates"] { --ico-color: var(--pink); }

/* ===== Inbox column (flat) ===== */
.inbox-list {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.inbox-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 5;
}
.inbox-title-row { display: flex; align-items: center; gap: 8px; }
.inbox-title-row h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; line-height: 1; }
.inbox-title-row .num { color: var(--text-3); font-weight: 500; font-size: 11px; letter-spacing: 0; margin-right: auto; }

.inbox-tabs { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; min-width: 0; }
.inbox-header { position: relative; }
.tab {
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: transparent; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.15s var(--ease);
}
.tab:hover { background: var(--bg-soft); color: var(--text); }
.tab.active { background: var(--text); color: var(--surface); }
.tab .num { opacity: 0.6; font-weight: 500; }
.tab.active .num { opacity: 0.75; }

.inbox-rows { flex: 1; overflow-y: auto; padding: 4px 6px 10px; position: relative; }

/* ===== Inbox header — live-pip + sort-trigger ===== */
.inbox-toolbar { display: flex; align-items: center; gap: 8px; }
.live-pip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
  color: var(--green);
  background: rgba(26, 168, 108, 0.10);
  padding: 3px 8px; border-radius: 999px;
  border: 1px solid rgba(26, 168, 108, 0.20);
  transition: all 0.2s var(--ease);
}
.live-pip .pip-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 2px rgba(26, 168, 108, 0.18), 0 0 6px var(--green);
  animation: pipPulse 2s ease-in-out infinite;
}
.live-pip.flash { animation: pipFlash 1.6s ease-in-out; background: rgba(26, 168, 108, 0.20); }
@keyframes pipPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }
@keyframes pipFlash { 0% { box-shadow: 0 0 0 6px rgba(26,168,108,0.20); } 100% { box-shadow: 0 0 0 0 rgba(26,168,108,0); } }

.sort-trigger {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--text-2);
  padding: 4px 8px; border-radius: 7px;
  background: var(--bg-soft);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  margin-left: auto;
}
.sort-trigger:hover { background: var(--surface); color: var(--text); }
.sort-trigger svg { width: 11px; height: 11px; }
.sort-trigger .label { letter-spacing: -0.01em; }

.sort-menu {
  position: absolute; top: 100%; right: 8px;
  margin-top: 4px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  padding: 4px;
  min-width: 200px;
  z-index: 50;
  display: none;
}
.sort-menu.open { display: block; animation: menuIn 0.15s var(--ease); }
@keyframes menuIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.sort-menu .item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: 6px;
  font-size: 12px; font-weight: 500; color: var(--text-2);
  cursor: pointer; width: 100%; text-align: left;
  transition: background 0.1s;
}
.sort-menu .item:hover { background: var(--bg-soft); color: var(--text); }
.sort-menu .item.active { background: var(--accent-soft); color: var(--accent-2); font-weight: 600; }
.sort-menu .item svg { width: 13px; height: 13px; opacity: 0.7; }
.sort-menu .item .check { margin-left: auto; opacity: 0; }
.sort-menu .item.active .check { opacity: 1; color: var(--accent); }
.sort-menu .item.ai-item { background: linear-gradient(135deg, rgba(108,92,231,0.06), rgba(236,72,153,0.04)); }
.sort-menu .item.ai-item .ai-badge {
  margin-left: auto;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.5px;
  background: var(--accent-grad); color: #fff;
  padding: 1px 5px; border-radius: 4px;
}
.sort-menu .item.ai-item.active .check { display: none; }

/* ===== Hover quick-actions on row ===== */
.row .quick-actions {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  display: flex; gap: 2px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 3px;
  box-shadow: var(--shadow-md);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s var(--ease);
}
.row:hover .quick-actions { opacity: 1; pointer-events: auto; }
.row .quick-actions button {
  width: 26px; height: 26px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.1s var(--ease);
}
.row .quick-actions button:hover { background: var(--bg-soft); color: var(--text); }
.row .quick-actions button.danger:hover { color: var(--red); background: rgba(239, 68, 88, 0.08); }
.row .quick-actions button.success:hover { color: var(--green); background: rgba(26, 168, 108, 0.08); }
.row .quick-actions button.primary:hover { color: var(--accent); background: var(--accent-soft); }
.row .quick-actions svg { width: 13px; height: 13px; }

.row { position: relative; }
.row.row-selected-multi { background: var(--accent-soft) !important; }
.row.row-selected-multi::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent-grad); border-radius: 0 3px 3px 0;
}

/* ===== Bulk-bar (bottom of inbox-list when multi-selected) ===== */
.bulk-bar {
  border-top: 1px solid var(--line);
  background: var(--surface);
  padding: 8px 12px;
  display: none;
  align-items: center; gap: 6px;
  box-shadow: 0 -4px 14px -4px rgba(20, 18, 32, 0.08);
  animation: bulkIn 0.25s var(--bounce);
}
.bulk-bar.show { display: flex; }
@keyframes bulkIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
.bulk-bar .count-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  background: var(--accent-grad); color: #fff;
  font-size: 11px; font-weight: 700; letter-spacing: -0.01em;
  box-shadow: 0 2px 8px var(--accent-glow);
}
.bulk-bar .bulk-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px; border-radius: 7px;
  font-size: 11.5px; font-weight: 600; color: var(--text-2);
  background: transparent;
  transition: all 0.15s var(--ease);
}
.bulk-bar .bulk-btn:hover { background: var(--bg-soft); color: var(--text); }
.bulk-bar .bulk-btn svg { width: 12px; height: 12px; }
.bulk-bar .bulk-btn.danger:hover { color: var(--red); background: rgba(239, 68, 88, 0.08); }
.bulk-bar .bulk-clear {
  margin-left: auto;
  font-size: 11px; color: var(--text-3); font-weight: 600;
  padding: 4px 8px; border-radius: 6px;
  cursor: pointer;
}
.bulk-bar .bulk-clear:hover { color: var(--text); background: var(--bg-soft); }
.row {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.15s var(--ease);
  position: relative;
}
.row:hover { background: var(--bg-soft); }
.row.selected { background: var(--accent-soft); }
.row.selected::before {
  content: ''; position: absolute; left: 4px; top: 18%; bottom: 18%; width: 3px;
  background: var(--accent-grad); border-radius: 3px;
}

.row .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff;
  letter-spacing: -0.3px; flex-shrink: 0;
  box-shadow: 0 3px 10px var(--avatar-glow, var(--accent-glow));
  position: relative;
}

.row .body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.row .top { display: flex; align-items: center; gap: 8px; min-width: 0; }
.row .who {
  font-size: 13px; font-weight: 700; letter-spacing: -0.2px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
  display: flex; align-items: center; gap: 6px;
}
.row.unread .who::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent-grad); flex-shrink: 0;
}
.row .meta-time {
  font-size: 10px; color: var(--text-3);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
  font-family: var(--font-mono); font-weight: 500;
}
.row .subject {
  font-size: 12px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 500;
}
.row.unread .subject { color: var(--text); }
.row .preview {
  font-size: 11px; color: var(--text-3);
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  margin-top: 1px;
}
.row .footer { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.tag {
  font-size: 9.5px; font-weight: 600; padding: 2px 6px; border-radius: 5px;
  background: var(--bg-soft); color: var(--text-2);
  display: inline-flex; align-items: center; gap: 3px;
  letter-spacing: -0.01em;
}
.tag svg { width: 9px; height: 9px; }
.tag.danger { background: rgba(239, 68, 88, 0.10); color: var(--red); }
.tag.warn { background: rgba(255, 138, 61, 0.12); color: var(--orange); }
.tag.info { background: rgba(20, 184, 192, 0.12); color: var(--teal); }
.tag.success { background: rgba(26, 168, 108, 0.10); color: var(--green); }
.tag.ai { background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(6,214,160,0.12)); color: var(--pink); }
.row .mailbox-trail { display: inline-flex; gap: 0; margin-left: auto; }
.row .mailbox-trail .mb {
  width: 14px; height: 14px; border-radius: 50%;
  color: #fff; font-size: 8px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
  margin-left: -4px;
}
.row.selected .mailbox-trail .mb { border-color: var(--surface); }

.row[data-lane="act-now"] { --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.30); }
.row[data-lane="sprint"] { --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.row[data-lane="bookable"] { --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.row[data-lane="review"] { --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.row[data-lane="unclear"] { --avatar-grad: linear-gradient(135deg,#f5b400,#ffd166); --avatar-glow: rgba(245,180,0,0.28); }
.row[data-lane="later"] { --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

/* ===== Thread (flat, no card-on-card) ===== */
.thread {
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--surface);
  border-right: 1px solid var(--line);
}
.thread.empty { display: flex; align-items: center; justify-content: center; padding: 60px; }
.thread.empty .placeholder { text-align: center; color: var(--text-3); max-width: 380px; }
.thread.empty .empty-illustration {
  width: 72px; height: 72px; margin: 0 auto 18px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-grad); border-radius: 18px;
  color: #fff;
  box-shadow: 0 10px 24px var(--accent-glow);
  animation: floatY 3.5s ease-in-out infinite;
}
.thread.empty .empty-illustration svg { width: 32px; height: 32px; }
@keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.thread.empty h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); margin-bottom: 6px; }
.thread.empty p { font-size: 12.5px; line-height: 1.55; color: var(--text-2); }
.thread.empty .key {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  background: var(--bg-soft); border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  margin: 0 2px; font-weight: 600;
}

.thread-head {
  padding: 16px 22px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 8px;
  background: var(--surface);
}
.thread-head .top { display: flex; gap: 12px; align-items: flex-start; }
.thread-head .top h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; flex: 1; line-height: 1.3; }
.thread-head .lane-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--lane-color); background: var(--lane-bg);
  white-space: nowrap; flex-shrink: 0;
}
.thread-head .lane-pill svg { width: 10px; height: 10px; }
.thread-head .who-line { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-2); flex-wrap: wrap; }
.thread-head .ava {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9.5px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 5px var(--avatar-glow, var(--accent-glow));
}
.thread-head .who-line strong { color: var(--text); font-weight: 700; font-size: 12px; }
.thread-head .who-line .email { color: var(--text-3); font-family: var(--font-mono); font-size: 10.5px; }
.thread-head .who-line .meta-chip { display: inline-flex; align-items: center; gap: 4px; color: var(--text-2); font-size: 11px; }
.thread-head .who-line .meta-chip svg { width: 10px; height: 10px; color: var(--text-3); }
.thread-head .who-line .sep { color: var(--text-3); }

.lane-act-now { --lane-color: var(--red); --lane-bg: rgba(239, 68, 88, 0.12); --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.30); }
.lane-sprint { --lane-color: var(--green); --lane-bg: rgba(26, 168, 108, 0.12); --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.lane-bookable { --lane-color: var(--teal); --lane-bg: rgba(20, 184, 192, 0.12); --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.lane-review { --lane-color: var(--orange); --lane-bg: rgba(255, 138, 61, 0.14); --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.lane-unclear { --lane-color: var(--yellow); --lane-bg: rgba(245, 180, 0, 0.14); }
.lane-later { --lane-color: var(--purple); --lane-bg: rgba(139, 92, 246, 0.12); --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

.thread-actions {
  padding: 7px 22px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 4px; flex-wrap: wrap;
  background: var(--surface);
}
.action {
  height: 26px; padding: 0 10px; border-radius: 7px;
  background: transparent;
  font-size: 11.5px; font-weight: 600; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s var(--ease);
}
.action svg { width: 12px; height: 12px; }
.action:hover { background: var(--bg-soft); color: var(--text); }
.action.primary {
  background: var(--accent-grad); color: #fff;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
}
.action.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35); }
.action.danger:hover { color: var(--red); }

/* Messages — flat, no boxed cards */
.thread-body {
  flex: 1; overflow-y: auto;
  padding: 4px 0;
  background: var(--surface);
}
.messages { display: flex; flex-direction: column; }
.msg {
  padding: 14px 22px;
  border-bottom: 1px solid var(--line);
  animation: msgIn 0.4s var(--ease) backwards;
  position: relative;
}
.msg:last-child { border-bottom: 0; }
.msg:nth-child(1) { animation-delay: 0.05s; }
.msg:nth-child(2) { animation-delay: 0.15s; }
.msg:nth-child(3) { animation-delay: 0.25s; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.draft { background: linear-gradient(180deg, rgba(255,107,157,0.04), rgba(6,214,160,0.02)); }
.msg.draft::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--ai-grad);
  background-size: 200% 100%;
  animation: aiShimmer 3s linear infinite;
}
@keyframes aiShimmer { from { background-position: 0 0; } to { background-position: -200% 0; } }
.msg-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 8px;
}
.msg-head .left { display: flex; align-items: center; gap: 10px; }
.msg-head .ava {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg-soft); color: var(--text-2);
  font-size: 10px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.msg.outbound .msg-head .ava { background: var(--accent-grad); color: #fff; box-shadow: 0 2px 5px var(--accent-glow); }
.msg.draft .msg-head .ava { background: var(--ai-grad); color: #fff; }
.msg-head .from { font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -0.15px; }
.msg-head .time { font-size: 10.5px; color: var(--text-3); font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-weight: 500; }
.msg-head .badge {
  padding: 1px 7px; border-radius: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: 4px;
}
.msg-head .badge svg { width: 9px; height: 9px; }
.msg.outbound .msg-head .badge { background: rgba(26, 168, 108, 0.12); color: var(--green); }
.msg.inbound .msg-head .badge { background: var(--bg-soft); color: var(--text-2); }
.msg.draft .msg-head .badge { background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(6,214,160,0.12)); color: var(--pink); }
.msg-body {
  font-size: 13px; line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  padding-left: 36px;
}

/* ===== AI summary block ===== */
.ai-summary {
  margin: 12px 22px 0;
  padding: 12px 14px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(108, 92, 231, 0.05) 0%, rgba(236, 72, 153, 0.04) 50%, rgba(6, 214, 160, 0.03) 100%);
  border: 1px solid rgba(108, 92, 231, 0.18);
  position: relative;
  overflow: hidden;
}
.ai-summary::before {
  content: ''; position: absolute; left: 0; right: 0; top: 0; height: 1.5px;
  background: var(--ai-grad);
  background-size: 200% 100%;
  animation: aiShimmer 3.5s linear infinite;
}
.ai-summary .ai-head {
  display: flex; align-items: center; gap: 7px;
  font-size: 9.5px; font-weight: 800; letter-spacing: 1px;
  color: var(--accent-2); text-transform: uppercase;
  margin-bottom: 8px;
}
.ai-summary .ai-head svg { width: 12px; height: 12px; }
.ai-summary .ai-head .tldr-toggle {
  margin-left: auto;
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  color: var(--text-3);
  background: rgba(255, 255, 255, 0.6);
  padding: 2px 8px; border-radius: 5px;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  display: inline-flex; align-items: center; gap: 4px;
}
.ai-summary .ai-head .tldr-toggle:hover { background: var(--surface); color: var(--text); }
.ai-summary .ai-head .tldr-toggle svg { width: 10px; height: 10px; transition: transform 0.2s; }
.ai-summary.expanded .ai-head .tldr-toggle svg { transform: rotate(180deg); }
.ai-summary .tldr {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.45;
  letter-spacing: -0.01em;
}
.ai-summary .points {
  list-style: none;
  margin-top: 10px;
  display: none;
  padding-left: 0;
}
.ai-summary.expanded .points { display: flex; flex-direction: column; gap: 6px; animation: pointsIn 0.25s var(--ease); }
@keyframes pointsIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.ai-summary .points li {
  display: flex; gap: 9px; align-items: flex-start;
  font-size: 12.5px; color: var(--text-2); line-height: 1.5;
  padding-left: 2px;
}
.ai-summary .points li::before {
  content: ''; display: inline-block;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent-grad);
  flex-shrink: 0; margin-top: 7px;
}

/* ===== Composer ===== */
.composer-wrap {
  border-top: 1px solid var(--line);
  background: var(--surface);
  padding: 12px 22px;
  position: sticky; bottom: 0;
  z-index: 4;
}
.composer-quick {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
}
.composer-quick .qr {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600; color: var(--accent-2);
  background: linear-gradient(135deg, rgba(108, 92, 231, 0.08), rgba(236, 72, 153, 0.06));
  border: 1px solid rgba(108, 92, 231, 0.20);
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.composer-quick .qr:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateY(-1px); }
.composer-quick .qr svg { width: 10px; height: 10px; }
.composer-quick .qr-label-row {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.8px; color: var(--text-3);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  margin-right: 4px;
}
.composer-quick .qr-label-row svg { width: 10px; height: 10px; color: var(--accent); }

.composer {
  border: 1px solid var(--line);
  border-radius: 11px;
  background: var(--surface);
  transition: all 0.15s var(--ease);
}
.composer:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.composer-input {
  width: 100%;
  border: 0; outline: 0;
  resize: none;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text);
  background: transparent;
  min-height: 60px;
  max-height: 200px;
}
.composer-input::placeholder { color: var(--text-3); }
.composer-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 9px;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
  border-radius: 0 0 10px 10px;
}
.composer-bar .tool {
  width: 26px; height: 26px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.1s var(--ease);
}
.composer-bar .tool:hover { background: var(--surface); color: var(--text); }
.composer-bar .tool svg { width: 13px; height: 13px; }
.composer-bar .send-btn {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 13px; height: 28px; border-radius: 7px;
  background: var(--accent-grad); color: #fff;
  font-size: 11.5px; font-weight: 700; letter-spacing: -0.01em;
  box-shadow: 0 3px 10px rgba(108, 92, 231, 0.25);
  transition: all 0.15s var(--ease);
}
.composer-bar .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(108, 92, 231, 0.35); }
.composer-bar .send-btn svg { width: 11px; height: 11px; }
.composer-bar .send-btn .kbd {
  font-size: 9px; font-weight: 600; letter-spacing: 0.3px;
  background: rgba(255, 255, 255, 0.18);
  padding: 1px 5px; border-radius: 3px;
}
.composer-hint { font-size: 10px; color: var(--text-3); padding: 0 4px; font-weight: 500; }

/* ===== Thread navigation arrows ===== */
.thread-nav { display: inline-flex; gap: 2px; margin-left: 8px; }
.thread-nav button {
  width: 24px; height: 24px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.1s var(--ease);
}
.thread-nav button:hover { background: var(--bg-soft); color: var(--text); }
.thread-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
.thread-nav button svg { width: 13px; height: 13px; }
.thread-nav .pos {
  font-size: 10.5px; color: var(--text-3); font-weight: 600;
  font-variant-numeric: tabular-nums;
  display: inline-flex; align-items: center; padding: 0 4px;
}

/* ===== History drawer overlay ===== */
.history-overlay {
  position: fixed; inset: 0;
  background: rgba(20, 18, 32, 0.42);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  animation: fadeIn 0.2s ease-out;
}
.history-overlay.open { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.history-drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 420px;
  background: var(--surface);
  border-left: 1px solid var(--line);
  box-shadow: -16px 0 40px rgba(20, 18, 32, 0.18);
  display: flex; flex-direction: column;
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.32s var(--ease);
}
.history-overlay.open + .history-drawer, .history-drawer.open { transform: translateX(0); }
.history-drawer .hd-head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.history-drawer .hd-head .ava {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12.5px; font-weight: 800; color: #fff;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.history-drawer .hd-head h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.history-drawer .hd-head .sub { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.history-drawer .hd-close {
  margin-left: auto;
  width: 28px; height: 28px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
}
.history-drawer .hd-close:hover { background: var(--bg-soft); color: var(--text); }
.history-drawer .hd-close svg { width: 14px; height: 14px; }
.history-drawer .hd-body {
  flex: 1; overflow-y: auto;
  padding: 18px 20px;
}
.history-drawer .hd-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 18px;
}
.history-drawer .hd-stat {
  background: var(--bg-soft); border-radius: 10px; padding: 10px 12px;
  text-align: left;
}
.history-drawer .hd-stat .num { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; color: var(--text); display: block; }
.history-drawer .hd-stat .lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; font-weight: 700; letter-spacing: 0.6px; }
.hd-section-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); margin: 16px 0 10px; }
.hd-timeline { list-style: none; position: relative; padding-left: 4px; }
.hd-timeline::before { content: ''; position: absolute; left: 11px; top: 6px; bottom: 6px; width: 1.5px; background: linear-gradient(180deg, var(--accent), var(--line) 80%); }
.hd-timeline li { display: flex; gap: 12px; padding: 8px 0; font-size: 12.5px; position: relative; align-items: flex-start; }
.hd-timeline .marker {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--surface); border: 2px solid var(--line);
  margin-left: 6px; margin-top: 4px; flex-shrink: 0; z-index: 1;
}
.hd-timeline li.recent .marker { background: var(--accent-grad); border-color: transparent; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.14); }
.hd-timeline li.outbound .marker { background: var(--green); border-color: transparent; }
.hd-timeline .body { flex: 1; min-width: 0; }
.hd-timeline .body .when { font-size: 10.5px; color: var(--text-3); font-family: var(--font-mono); font-weight: 500; margin-bottom: 2px; }
.hd-timeline .body .what { font-size: 12.5px; color: var(--text); font-weight: 500; line-height: 1.4; }
.hd-timeline .body .what strong { font-weight: 700; }

@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
.composer-input.shake { animation: shake 0.3s ease-in-out; }

/* ===== Context (right column, flat sections, no card-on-card) ===== */
.ctx-panel {
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 14px 16px;
  gap: 0;
}
.ctx-section { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
.ctx-section:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
.ctx-section .head {
  font-size: 9.5px; font-weight: 700; letter-spacing: 1px; color: var(--text-3);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 8px;
}
.ctx-section .head svg { width: 11px; height: 11px; }

.identity { display: flex; gap: 10px; align-items: center; }
.identity .ava {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12.5px; font-weight: 800; color: #fff;
  flex-shrink: 0; letter-spacing: -0.3px;
  box-shadow: 0 4px 12px var(--avatar-glow, var(--accent-glow));
}
.identity .who-name { font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -0.25px; }
.identity .email-line { font-size: 10.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); }

.kv-list { display: flex; flex-direction: column; gap: 7px; }
.kv-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.kv-item .label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); font-weight: 500; }
.kv-item .label svg { width: 11px; height: 11px; color: var(--text-3); }
.kv-item .val { font-size: 11.5px; color: var(--text); font-weight: 600; letter-spacing: -0.1px; text-align: right; }

.alert-box {
  padding: 9px 11px;
  border-radius: 9px;
  font-size: 11.5px; line-height: 1.5;
  color: var(--text);
}
.alert-box.risk { background: rgba(255, 138, 61, 0.08); border: 1px solid rgba(255, 138, 61, 0.20); }
.alert-box.next { background: rgba(26, 168, 108, 0.08); border: 1px solid rgba(26, 168, 108, 0.20); }

.timeline { list-style: none; position: relative; padding-left: 4px; }
.timeline::before {
  content: ''; position: absolute; left: 9px; top: 10px; bottom: 10px;
  width: 1.5px;
  background: linear-gradient(180deg, var(--accent), var(--line) 60%);
}
.timeline li { display: flex; gap: 10px; align-items: flex-start; padding: 5px 0; font-size: 11px; color: var(--text-2); position: relative; }
.timeline .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--line);
  margin-left: 6px;
  margin-top: 4px;
  flex-shrink: 0;
  z-index: 1;
}
.timeline li:first-child .dot { background: var(--accent-grad); border-color: transparent; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12); }

.mini-chart { display: flex; gap: 3px; align-items: end; height: 26px; }
.mini-chart .bar {
  flex: 1; background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 25%, transparent));
  border-radius: 2px;
  min-height: 3px;
}
.activity-meta { font-size: 11px; color: var(--text-2); margin-top: 7px; }
.activity-meta strong { color: var(--text); font-weight: 700; }

/* ===== Live-stats inline (replaces 4-grid for top of context) ===== */
.live-stats-row {
  display: flex; flex-wrap: wrap; gap: 4px 12px;
  font-size: 11.5px; color: var(--text-2); line-height: 1.5;
  margin-top: 6px;
}
.live-stats-row .ls-link {
  color: var(--text-2);
  font-weight: 600;
  text-decoration: none;
  transition: color 0.15s;
  display: inline-flex; align-items: center; gap: 4px;
  cursor: pointer;
}
.live-stats-row .ls-link:hover { color: var(--accent); }
.live-stats-row .ls-link strong { color: var(--text); font-weight: 800; }
.live-stats-row .ls-link svg { width: 11px; height: 11px; opacity: 0.6; }
.live-stats-row .sep { color: var(--text-3); user-select: none; }

/* ===== Upcoming booking card ===== */
.booking-card {
  border-radius: 11px;
  background: linear-gradient(135deg, rgba(20, 184, 192, 0.08) 0%, rgba(108, 92, 231, 0.04) 100%);
  border: 1px solid rgba(20, 184, 192, 0.25);
  padding: 11px 12px;
  display: flex; gap: 10px; align-items: flex-start;
  position: relative; overflow: hidden;
}
.booking-card::before {
  content: ''; position: absolute; right: -30px; top: -30px;
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle, rgba(20, 184, 192, 0.10) 0%, transparent 70%);
  pointer-events: none;
}
.booking-card .b-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--teal), #4cc9f0);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(20, 184, 192, 0.30);
}
.booking-card .b-icon svg { width: 16px; height: 16px; }
.booking-card .b-info { flex: 1; min-width: 0; }
.booking-card .b-svc { font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
.booking-card .b-when { font-size: 11px; color: var(--text-2); margin-top: 2px; font-variant-numeric: tabular-nums; }
.booking-card .b-meta { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }
.booking-card .b-actions {
  display: flex; gap: 4px; margin-top: 8px;
}
.booking-card .b-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 6px;
  font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em;
  background: rgba(255, 255, 255, 0.7); color: var(--teal);
  border: 1px solid rgba(20, 184, 192, 0.25);
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.booking-card .b-btn:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
.booking-card .b-btn svg { width: 10px; height: 10px; }

.no-booking {
  font-size: 11.5px; color: var(--text-3); font-style: italic;
  padding: 8px 10px; border-radius: 9px;
  background: var(--bg-soft);
  display: flex; align-items: center; gap: 7px;
}
.no-booking svg { width: 12px; height: 12px; opacity: 0.6; }
.no-booking .book-now {
  margin-left: auto;
  font-size: 10.5px; font-weight: 700; color: var(--accent);
  cursor: pointer;
  font-style: normal;
}
.no-booking .book-now:hover { text-decoration: underline; }

/* ===== AI feedback buttons ===== */
.ai-actions {
  display: flex; gap: 4px; margin-top: 8px;
}
.ai-act {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 6px;
  font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em;
  cursor: pointer;
  transition: all 0.15s var(--ease);
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text-2);
}
.ai-act:hover { transform: translateY(-1px); }
.ai-act svg { width: 10px; height: 10px; }
.ai-act.accept:hover { background: rgba(26, 168, 108, 0.10); color: var(--green); border-color: rgba(26, 168, 108, 0.30); }
.ai-act.adjust:hover { background: rgba(108, 92, 231, 0.10); color: var(--accent-2); border-color: rgba(108, 92, 231, 0.30); }
.ai-act.reject:hover { background: rgba(239, 68, 88, 0.10); color: var(--red); border-color: rgba(239, 68, 88, 0.30); }
.ai-act.applied { pointer-events: none; }
.ai-act.accept.applied { background: rgba(26, 168, 108, 0.14); color: var(--green); border-color: rgba(26, 168, 108, 0.40); }

/* ===== Activity comparison ===== */
.activity-compare { margin-top: 10px; }
.compare-row {
  display: grid; grid-template-columns: 60px 1fr 50px;
  align-items: center; gap: 8px;
  font-size: 11px; padding: 4px 0;
}
.compare-row .who { color: var(--text-2); font-weight: 600; letter-spacing: -0.01em; }
.compare-row .who.mine { color: var(--accent-2); font-weight: 700; }
.compare-row .bar-wrap {
  height: 6px; background: var(--bg-soft); border-radius: 3px; position: relative; overflow: hidden;
}
.compare-row .bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 3px;
  background: var(--text-3);
}
.compare-row.mine .bar-fill { background: var(--accent-grad); box-shadow: 0 0 8px var(--accent-glow); }
.compare-row .num { font-size: 11px; color: var(--text-2); font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
.compare-row.mine .num { color: var(--text); }
.compare-summary {
  margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line);
  font-size: 11px; color: var(--text-2);
}
.compare-summary strong { color: var(--green); font-weight: 800; }
.compare-summary.slower strong { color: var(--orange); }

/* ===== Notes / internal-chat ===== */
.notes-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.note {
  padding: 8px 10px;
  border-radius: 9px;
  background: var(--bg-soft);
  position: relative;
}
.note.ai { background: linear-gradient(135deg, rgba(108,92,231,0.06), rgba(236,72,153,0.04)); border: 1px solid rgba(108, 92, 231, 0.18); }
.note .n-head {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 3px;
  font-size: 10.5px; color: var(--text-3); font-weight: 600;
}
.note .n-author { color: var(--text-2); font-weight: 700; }
.note.ai .n-author { color: var(--accent-2); display: inline-flex; align-items: center; gap: 3px; }
.note.ai .n-author svg { width: 10px; height: 10px; }
.note .n-time { margin-left: auto; font-family: var(--font-mono); font-weight: 500; font-size: 10px; }
.note .n-body { font-size: 11.5px; line-height: 1.5; color: var(--text); }
.note-input-wrap {
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--surface);
  transition: all 0.15s var(--ease);
}
.note-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.note-input {
  width: 100%;
  border: 0; outline: 0; resize: none;
  padding: 7px 9px;
  font-family: inherit; font-size: 11.5px; line-height: 1.45;
  color: var(--text);
  background: transparent;
  min-height: 40px;
}
.note-input::placeholder { color: var(--text-3); }
.note-input-bar {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 6px; border-top: 1px solid var(--line);
  background: var(--bg-soft);
  border-radius: 0 0 8px 8px;
}
.note-input-bar .hint { font-size: 9.5px; color: var(--text-3); font-weight: 500; padding-left: 4px; }
.note-input-bar .post-btn {
  margin-left: auto;
  padding: 3px 9px; border-radius: 6px;
  font-size: 10.5px; font-weight: 700;
  background: var(--accent-grad); color: #fff;
  display: inline-flex; align-items: center; gap: 4px;
  box-shadow: 0 2px 6px var(--accent-glow);
}
.note-input-bar .post-btn:hover { transform: translateY(-1px); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 1280px) { .body { grid-template-columns: 184px 320px 1fr 244px; } }
@media (max-width: 1100px) { .body { grid-template-columns: 184px 320px 1fr; } .ctx-panel { display: none; } }
@media (max-width: 800px) { .body { grid-template-columns: 1fr; } .sidebar, .inbox-list { display: none; } }
</style>

  // AI-prio är en heuristisk score: hög risk=10, oläst=4, lane act-now=6, lane review=4, lane bookable=3
  function aiPriorityScore(t) {
    let s = 0;
    if ((t.tags||[]).some(g=>g.tone==='danger')) s += 10;
    if (t.unread) s += 4;
    if (t.lane==='act-now') s += 6;
    else if (t.lane==='review') s += 4;
    else if (t.lane==='bookable') s += 3;
    else if (t.lane==='sprint') s += 2;
    if (/deadline|måndag|före/i.test(t.subject||'')) s += 3;
    return s;
  }
  function timeRank(t) {
    // ungefärlig tid-rank baserat på t.time
    if (/Idag|^\d/.test(t.time)) return 100;
    if (/Igår/i.test(t.time)) return 50;
    if (/Mån|Tis|Ons|Tor|Fre/i.test(t.time)) return 30;
    return 10;
  }

    counts['high-risk'] = state.threads.filter(t=>(t.tags||[]).some(g=>g.tone==='danger')).length;
    counts.today = state.threads.filter(t=>/Idag/i.test(t.time)).length;

      <button class="tab${state.tab===tab.id?' active':''}" data-tab="${tab.id}">

  function visibleThreads() {
    let v = state.threads.slice();
    if (state.tab==='unread') v = v.filter(t=>t.unread);
    if (state.tab==='mine') v = v.filter(t=>/Fazli/i.test(t.owner||''));
    if (state.tab==='high-risk') v = v.filter(t=>(t.tags||[]).some(g=>g.tone==='danger'));
    if (state.tab==='today') v = v.filter(t=>/Idag/i.test(t.time));
    // Sort
    if (state.sortBy==='oldest') v.sort((a,b)=>timeRank(a)-timeRank(b));
    else if (state.sortBy==='risk') v.sort((a,b)=>{ const ra=(a.tags||[]).some(g=>g.tone==='danger')?1:0; const rb=(b.tags||[]).some(g=>g.tone==='danger')?1:0; if (rb!==ra) return rb-ra; return timeRank(b)-timeRank(a); });
    else if (state.sortBy==='ai') v.sort((a,b)=>aiPriorityScore(b)-aiPriorityScore(a));
    else /* newest */ v.sort((a,b)=>timeRank(b)-timeRank(a));
    return v;
  }

  function bindShortcuts() {
    document.addEventListener('keydown', ev => {
      if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if (!ev.metaKey && !ev.ctrlKey) return;
      const k = ev.key;
      if (/^[1-9]$/.test(k)) {
        const target = document.querySelector(`.nav-item[data-shortcut="${k}"]`);
        if (target) {
          ev.preventDefault();
          target.click();
          // visa active state
          document.querySelectorAll('.nav-item.active').forEach(n => n.classList.remove('active'));
          target.classList.add('active');
        }
      }
    });
  }

  function renderAll() { renderTabs(); renderRows(); renderThread(); renderTodayStats(); renderMailboxBars(); }

  // ==== Toast ====
  function toast(msg) {
    let el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.3);opacity:0;transition:opacity 0.2s, transform 0.2s;';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(8px)'; }, 1800);
  }

  // ==== Bulk-bar ====
  function renderBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const num = document.getElementById('bulk-num');
    if (!bar) return;
    const c = state.multiSelect.size;
    if (c > 0) { bar.classList.add('show'); if (num) num.textContent = c; }
    else { bar.classList.remove('show'); }
  }

  // ==== Sort menu ====
  function toggleSortMenu(force) {
    const menu = document.getElementById('sort-menu');
    if (!menu) return;
    const open = force !== undefined ? force : !menu.classList.contains('open');
    menu.classList.toggle('open', open);
  }

  // ==== Thread nav (prev/next) ====
  function jumpThread(dir) {
    const v = visibleThreads();
    const idx = v.findIndex(x=>x.id===state.selectedId);
    if (idx < 0) return;
    const next = dir === 'prev' ? v[idx-1] : v[idx+1];
    if (!next) return;
    state.selectedId = next.id;
    renderRows();
    renderThread();
  }

  // ==== History drawer ====
  function openHistory() {
    const t = state.threads.find(x=>x.id===state.selectedId);
    if (!t) return;
    let overlay = document.getElementById('hist-overlay');
    let drawer = document.getElementById('hist-drawer');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'hist-overlay';
      overlay.className = 'history-overlay';
      drawer = document.createElement('aside');
      drawer.id = 'hist-drawer';
      drawer.className = 'history-drawer';
      document.body.appendChild(overlay);
      document.body.appendChild(drawer);
      overlay.addEventListener('click', closeHistory);
    }
    const h = t.customerHistory || { totalEmails:0, bookings:0, firstContact:'—', lastBooking:'—', events:[] };
    const events = (h.events||[]).map(e=>{
      const cls = (e.recent?'recent':'') + (e.outbound?' outbound':'');
      return `<li class="${cls}"><span class="marker"></span><div class="body"><div class="when">${escHtml(e.when)}</div><div class="what">${escHtml(e.what)}</div></div></li>`;
    }).join('');
    drawer.innerHTML = `
      <div class="hd-head">
        <span class="ava">${escHtml(t.initials)}</span>
        <div>
          <h3>${escHtml(t.who)}</h3>
          <div class="sub">${escHtml(t.email)}</div>
        </div>
        <button class="hd-close" id="hist-close">${ico('i-x')}</button>
      </div>
      <div class="hd-body">
        <div class="hd-stats">
          <div class="hd-stat"><span class="num">${h.totalEmails}</span><span class="lbl">Mejl totalt</span></div>
          <div class="hd-stat"><span class="num">${h.bookings}</span><span class="lbl">Bokningar</span></div>
          <div class="hd-stat"><span class="num">${escHtml(h.firstContact)}</span><span class="lbl">Första kontakt</span></div>
        </div>
        <div class="hd-section-title">Tidslinje · alla händelser</div>
        <ul class="hd-timeline">${events}</ul>
      </div>`;
    overlay.classList.add('open');
    drawer.classList.add('open');
    document.getElementById('hist-close')?.addEventListener('click', closeHistory);
  }
  function closeHistory() {
    document.getElementById('hist-overlay')?.classList.remove('open');
    document.getElementById('hist-drawer')?.classList.remove('open');
  }

  // ==== Composer helpers ====
  function focusComposer() {
    const ta = document.getElementById('composer-input');
    if (ta) ta.focus();
  }
  function sendComposer() {
    const ta = document.getElementById('composer-input');
    if (!ta) return;
    const text = (ta.value || '').trim();
    if (!text) {
      ta.classList.remove('shake'); void ta.offsetWidth; ta.classList.add('shake');
      ta.focus();
      return;
    }
    toast('Mejl skickat (demo) · ' + text.length + ' tecken');
    ta.value = '';
  }

  // ==== Live-pip flash on simulated new mail ====
  let livePipTimer = null;
  function simulateLiveActivity() {
    if (livePipTimer) clearInterval(livePipTimer);
    livePipTimer = setInterval(() => {
      const pip = document.getElementById('live-pip');
      if (!pip) return;
      pip.classList.remove('flash');
      // force reflow + add
      void pip.offsetWidth;
      pip.classList.add('flash');
      pip.firstElementChild.style.background = '#22d36a';
      setTimeout(()=>{ pip.classList.remove('flash'); pip.firstElementChild.style.background = ''; }, 1600);
    }, 22000);
  }

  function bind() {
    document.addEventListener('click', ev=>{
      // ===== Context column actions =====
      // Live-stats links
      const ls = ev.target.closest('[data-ls]');
      if (ls) { toast(`Öppnar ${ls.dataset.ls === 'emails' ? 'mejlhistorik' : ls.dataset.ls === 'bookings' ? 'bokningar' : 'tidslinje'} (demo)`); return; }
      // Booking actions
      const bookAct = ev.target.closest('[data-book-action]');
      if (bookAct) {
        const a = bookAct.dataset.bookAction;
        if (a === 'ics') {
          const t = state.threads.find(x=>x.id===state.selectedId);
          const u = t?.upcomingBooking;
          if (!u) return;
          const ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nSUMMARY:${u.service} - ${t.who}\r\nDESCRIPTION:CCO export\r\nLOCATION:${u.loc||''}\r\nDTSTART:20260506T130000\r\nDTEND:20260506T140000\r\nEND:VEVENT\r\nEND:VCALENDAR`;
          const blob = new Blob([ics], {type:'text/calendar'});
          const url = URL.createObjectURL(blob);
          const a2 = document.createElement('a'); a2.href = url; a2.download = `${t.who.replace(/\s+/g,'-')}-${u.service}.ics`; a2.click();
          URL.revokeObjectURL(url);
          toast('.ics-fil exporterad');
        } else if (a === 'reschedule') toast('Boka om — öppnar kalender (demo)');
        else if (a === 'new') toast('Ny bokning — öppnar kalender (demo)');
        return;
      }
      // AI feedback
      const aiFb = ev.target.closest('[data-ai-feedback]');
      if (aiFb) {
        const fb = aiFb.dataset.aiFeedback;
        const key = aiFb.dataset.aiKey;
        const labels = {accept:'AI-förslag accepterat', adjust:'Markerat för justering', reject:'AI-förslag avvisat'};
        toast(`${labels[fb]} (${key})`);
        // visa applied state
        aiFb.parentElement.querySelectorAll('.ai-act').forEach(b => b.classList.remove('applied'));
        aiFb.classList.add('applied');
        return;
      }
      // Post note
      const postNote = ev.target.closest('[data-post-note]');
      if (postNote) {
        const tid = postNote.dataset.postNote;
        const ta = document.getElementById('note-input-' + tid);
        if (!ta) return;
        const text = (ta.value || '').trim();
        if (!text) { ta.focus(); return; }
        const t = state.threads.find(x=>x.id===tid);
        if (t) {
          (t.notes = t.notes || []).unshift({author:'Fazli K.',time:'Just nu',body:text});
          ta.value = '';
          renderCtx(t);
          toast('Anteckning postad');
        }
        return;
      }
      // Thread nav prev/next
      const tnav = ev.target.closest('[data-thread-nav]');
      if (tnav && !tnav.disabled) { jumpThread(tnav.dataset.threadNav); return; }
      // History drawer
      if (ev.target.closest('[data-history-open]')) { openHistory(); return; }
      // TLDR toggle
      if (ev.target.closest('#tldr-toggle')) {
        document.getElementById('ai-summary')?.classList.toggle('expanded');
        return;
      }
      // Quick-reply pre-fill composer
      const qr = ev.target.closest('[data-qr]');
      if (qr) {
        const ta = document.getElementById('composer-input');
        if (ta) {
          ta.value = qr.dataset.qr + '\n\n';
          ta.focus();
          ta.setSelectionRange(ta.value.length, ta.value.length);
        }
        return;
      }
      // Focus composer button
      if (ev.target.closest('[data-focus-composer]')) { focusComposer(); return; }
      // Send composer
      if (ev.target.closest('#send-btn')) { sendComposer(); return; }
      // Sort menu trigger
      const sortTrig = ev.target.closest('#sort-trigger');
      if (sortTrig) { ev.stopPropagation(); toggleSortMenu(); return; }
      const sortItem = ev.target.closest('.sort-menu .item');
      if (sortItem) {
        state.sortBy = sortItem.dataset.sort;
        document.getElementById('sort-label').textContent = SORT_LABELS[state.sortBy] || 'Nyaste';
        document.querySelectorAll('.sort-menu .item').forEach(i=>i.classList.toggle('active', i===sortItem));
        toggleSortMenu(false);
        renderRows();
        return;
      }
      // Click outside menu closes it
      if (!ev.target.closest('.sort-menu')) toggleSortMenu(false);

      // Bulk actions
      const bulkBtn = ev.target.closest('[data-bulk]');
      if (bulkBtn) {
        const action = bulkBtn.dataset.bulk;
        const c = state.multiSelect.size;
        const labels = { done:'klara', snooze:'snoozade', assign:'tilldelade', delete:'raderade' };
        toast(`${c} trådar ${labels[action]||action}`);
        if (action === 'delete' || action === 'done') {
          state.threads = state.threads.filter(t => !state.multiSelect.has(t.id));
        }
        state.multiSelect.clear();
        renderRows();
        renderBulkBar();
        renderTodayStats();
        return;
      }
      const bulkClear = ev.target.closest('#bulk-clear');
      if (bulkClear) { state.multiSelect.clear(); renderRows(); renderBulkBar(); return; }

      // Quick-actions on row
      const quick = ev.target.closest('[data-quick]');
      if (quick) {
        ev.stopPropagation();
        const action = quick.dataset.quick;
        const id = quick.dataset.id;
        const labels = { reply:'Svar öppnat', snooze:'Snoozad', done:'Markerad klar', delete:'Raderad' };
        toast(labels[action] || action);
        if (action === 'delete' || action === 'done') {
          state.threads = state.threads.filter(t => t.id !== id);
          if (state.selectedId === id) state.selectedId = state.threads[0]?.id;
        }
        renderRows();
        renderThread();
        renderTodayStats();
        return;
      }

      // Tab
      const tab = ev.target.closest('[data-tab]');
      if (tab) { state.tab = tab.dataset.tab; renderTabs(); renderRows(); return; }

      // Row click — handle shift+click for multi-select
      const row = ev.target.closest('.row[data-id]');
      if (row) {
        const id = row.dataset.id;
        if (ev.shiftKey) {
          // range select from lastClickedId to id
          const v = visibleThreads();
          const lastIdx = state.lastClickedId ? v.findIndex(t=>t.id===state.lastClickedId) : -1;
          const curIdx = v.findIndex(t=>t.id===id);
          if (lastIdx >= 0 && curIdx >= 0) {
            const [a, b] = lastIdx < curIdx ? [lastIdx, curIdx] : [curIdx, lastIdx];
            for (let i=a; i<=b; i++) state.multiSelect.add(v[i].id);
          } else {
            state.multiSelect.add(id);
          }
          renderRows();
          renderBulkBar();
          return;
        }
        if (ev.metaKey || ev.ctrlKey) {
          // toggle selection
          if (state.multiSelect.has(id)) state.multiSelect.delete(id); else state.multiSelect.add(id);
          state.lastClickedId = id;
          renderRows();
          renderBulkBar();
          return;
        }
        // Normal click
        state.lastClickedId = id;
        if (state.multiSelect.size > 0) state.multiSelect.clear();
        state.selectedId = id;
        renderRows();
        renderThread();
        renderBulkBar();
        return;
      }
    });
    document.addEventListener('keydown', ev=>{
      // Cmd+Enter inom textarea = skicka
      if (ev.target.id === 'composer-input') {
        if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') {
          ev.preventDefault();
          sendComposer();
        }
        if (ev.key === 'Escape') ev.target.blur();
        return;
      }
      if (ev.target.classList && ev.target.classList.contains('note-input')) {
        if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') {
          ev.preventDefault();
          const tid = ev.target.id.replace('note-input-','');
          document.querySelector(`[data-post-note="${tid}"]`)?.click();
        }
        return;
      }
      if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if (ev.metaKey && ev.key==='k') { ev.preventDefault(); $('#search-input').focus(); return; }
      // Cmd+[ / Cmd+] för prev/next-tråd
      if ((ev.metaKey||ev.ctrlKey) && (ev.key==='['||ev.key==='Dead')) { ev.preventDefault(); jumpThread('prev'); return; }
      if ((ev.metaKey||ev.ctrlKey) && ev.key===']') { ev.preventDefault(); jumpThread('next'); return; }
      // Esc stänger drawer
      if (ev.key === 'Escape') { closeHistory(); return; }
      // R fokuserar composer
      if (ev.key === 'r' || ev.key === 'R') { ev.preventDefault(); focusComposer(); return; }
      const v = visibleThreads();
      const idx = v.findIndex(t=>t.id===state.selectedId);
      if (ev.key==='j'||ev.key==='ArrowDown') { ev.preventDefault(); const n=v[Math.min(v.length-1,idx+1)]||v[0]; if(n){state.selectedId=n.id;renderRows();renderThread();} }
      else if (ev.key==='k'||ev.key==='ArrowUp') { ev.preventDefault(); const p=v[Math.max(0,idx-1)]||v[0]; if(p){state.selectedId=p.id;renderRows();renderThread();} }
    });
  }

  async function tryLoadLive() {
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok) return false;
      const r = await fetch('/api/v1/cco/runtime/worklist/consumer?limit=50', { headers:{Authorization:'Bearer '+tok} });
      if (!r.ok) return false;
      const j = await r.json();
      if (!j.ok || !Array.isArray(j.rows) || j.rows.length===0) return false;
      state.threads = j.rows.map(mapApiRow);
      state.selectedId = state.threads[0]?.id;
      state.live = true;
      const status = $('#conn-status');
      status.innerHTML = `<span class="status-dot"></span> Live · ${state.threads.length}`;
      return true;
    } catch (e) { return false; }
  }
  function mapApiRow(row) {
    const laneRaw = String(row.lane||'').toLowerCase().replace(/_/g,'-');
    const lane = ['act-now','sprint','bookable','review','unclear','later','medical'].includes(laneRaw)?laneRaw:'unclear';
    const laneIconMap = {'act-now':'i-bolt','sprint':'i-trend','bookable':'i-calendar','review':'i-eye','unclear':'i-question','later':'i-pause'};
    const who = row.customerName || row.customerEmail?.split('@')[0] || 'Okänd';
    const initials = who.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
    return {
      id: row.conversationKey||row.mailboxConversationId,
      lane, laneIcon: laneIconMap[lane]||'i-circle-dot',
      laneLabel: lane==='act-now'?'Agera nu':lane[0].toUpperCase()+lane.slice(1),
      unread: row.hasUnreadInbound===true, who, email: row.customerEmail||'', initials,
      mailbox: row.mailboxAddress?.split('@')[0]||'Inkorg', mailboxTrail:[],
      subject: row.subject||'(utan ämne)', preview: row.latestPreview||'',
      time: row.lastInboundAt?new Date(row.lastInboundAt).toLocaleString('sv',{hour:'2-digit',minute:'2-digit'}):'',
      tags:[], conversation:[{from:who,dir:'inbound',time:row.lastInboundAt||'',initials,body:row.latestPreview||''}],
      timeline:[], risk:'', nextStep: row.hasUnreadInbound?'Svara nu':'Granska tråden',
      lifecycle: row.hasUnreadInbound?'Olast':'Aktiv', followUp:'—',
      riskLevel: row.hoursSinceInbound>24?'Hög':'Låg', owner: row.ownershipMailbox?.split('@')[0]||'—',
    };
  }

  async function init() { bind(); bindPresence(); bindShortcuts(); await tryLoadLive(); renderAll(); simulateLiveActivity(); }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>

</body>
