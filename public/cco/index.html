<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCO — Hair TP Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fbfbfd;
  --bg-soft: #f4f3f7;
  --bg-hover: #f0eff4;
  --surface: #ffffff;
  --line: rgba(20, 18, 32, 0.07);
  --line-2: rgba(20, 18, 32, 0.12);
  --text: #0a0612;
  --text-2: #4a4458;
  --text-3: #8b8595;
  --accent: #6c5ce7;
  --accent-2: #5848d6;
  --accent-soft: rgba(108, 92, 231, 0.10);
  --accent-glow: rgba(108, 92, 231, 0.30);
  --accent-grad: linear-gradient(135deg, #6c5ce7 0%, #ec4899 100%);
  --ai-grad: linear-gradient(135deg, #ff6b9d 0%, #ffd166 50%, #06d6a0 100%);
  --red: #ef4458;
  --orange: #ff8a3d;
  --yellow: #f5b400;
  --green: #1aa86c;
  --teal: #14b8c0;
  --pink: #ec4899;
  --purple: #8b5cf6;
  --indigo: #6366f1;
  --font-sans: "Inter", -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
  --shadow-xs: 0 1px 2px rgba(20, 18, 32, 0.05);
  --shadow-sm: 0 1px 3px rgba(20, 18, 32, 0.06), 0 6px 14px -4px rgba(20, 18, 32, 0.08);
  --shadow-glow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 8px 20px rgba(108, 92, 231, 0.20);
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 12.5px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  letter-spacing: -0.011em;
}
button, input, select { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: 0; }
button { cursor: pointer; }
::selection { background: var(--accent-soft); color: var(--accent-2); }

.app { display: grid; grid-template-rows: 44px 1fr; height: 100vh; }

/* ===== Top bar ===== */
.topbar {
  display: grid;
  grid-template-columns: 200px 1fr 280px;
  align-items: center;
  padding: 0 14px;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--line);
  gap: 16px;
  position: relative; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; letter-spacing: -0.3px; }
.brand .logo {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.4);
  position: relative; overflow: hidden;
}
.brand .logo svg { width: 13px; height: 13px; }
.brand .sep { color: var(--text-3); margin: 0 2px; font-weight: 400; }
.brand .ctx { color: var(--text-2); font-weight: 500; font-size: 12px; }

.search { position: relative; max-width: 480px; margin: 0 auto; width: 100%; }
.search input {
  width: 100%; height: 28px;
  background: var(--bg-soft);
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 0 12px 0 32px;
  color: var(--text);
  font-size: 12.5px; outline: none;
  transition: all 0.2s var(--ease);
}
.search input::placeholder { color: var(--text-3); }
.search input:focus { background: var(--surface); border-color: var(--accent); box-shadow: var(--shadow-glow); }
.search .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; display: flex; }
.search kbd {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-sans); font-size: 9.5px; color: var(--text-3);
  background: var(--surface); padding: 1px 5px; border-radius: 4px;
  border: 1px solid var(--line); font-weight: 500;
}

.topbar-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.icon-btn {
  width: 26px; height: 26px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.15s var(--ease);
}
.icon-btn:hover { background: var(--bg-soft); color: var(--text); }
.status-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 10px; height: 24px; border-radius: 999px;
  background: var(--bg-soft);
  font-size: 11px; color: var(--text-2); font-weight: 600;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(26, 168, 108, 0.18);
  animation: pulse 2.4s ease-in-out infinite;
}
.status-dot.demo { background: var(--yellow); box-shadow: 0 0 0 3px rgba(245, 180, 0, 0.18); }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.85); opacity: 0.7; } }

.compose-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 26px; border-radius: 8px;
  background: var(--accent-grad); color: #fff;
  font-size: 12px; font-weight: 600; letter-spacing: -0.01em;
  transition: all 0.2s var(--ease);
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
}
.compose-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35); }
.compose-btn svg { width: 14px; height: 14px; }

/* ===== Body — flat 4-column layout, NO nested cards ===== */
.body {
  display: grid;
  grid-template-columns: 200px 340px 1fr 264px;
  overflow: hidden;
}

/* ===== Sidebar (just a list, no card) ===== */
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 12px 8px;
}
.sidebar-section + .sidebar-section { margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--line); }
.sidebar-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 1.1px;
  color: var(--text-3); text-transform: uppercase;
  padding: 0 8px 6px; display: flex; justify-content: space-between; align-items: center;
}
.sidebar-label .add {
  width: 18px; height: 18px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px;
}
.sidebar-label .add:hover { background: var(--bg-soft); color: var(--text); }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 8px; border-radius: 7px;
  color: var(--text-2);
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s var(--ease);
  width: 100%; text-align: left;
  letter-spacing: -0.01em;
}
.nav-item:hover { background: var(--bg-soft); color: var(--text); }
.nav-item.active {
  background: var(--accent-grad); color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 14px rgba(108, 92, 231, 0.30);
}
.nav-item.active .count { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item.active .ico { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item .ico {
  width: 20px; height: 20px; border-radius: 5px;
  background: var(--ico-bg, transparent);
  color: var(--ico-color, var(--text-3));
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s var(--ease);
}
.nav-item .ico svg { width: 12px; height: 12px; }
.nav-item .label { flex: 1; }
.nav-item .count {
  font-size: 10.5px; color: var(--text-3); font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.nav-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px var(--bg); }

.nav-item[data-ico="inbox"] { --ico-color: var(--accent); }
.nav-item[data-ico="act-now"] { --ico-color: var(--red); }
.nav-item[data-ico="sprint"] { --ico-color: var(--green); }
.nav-item[data-ico="bookable"] { --ico-color: var(--teal); }
.nav-item[data-ico="review"] { --ico-color: var(--orange); }
.nav-item[data-ico="later"] { --ico-color: var(--purple); }
.nav-item[data-ico="done"] { --ico-color: var(--text-2); }
.nav-item[data-ico="users"] { --ico-color: var(--teal); }
.nav-item[data-ico="auto"] { --ico-color: var(--yellow); }
.nav-item[data-ico="chart"] { --ico-color: var(--indigo); }
.nav-item[data-ico="templates"] { --ico-color: var(--pink); }

/* ===== Inbox column (flat) ===== */
.inbox-list {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.inbox-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 5;
}
.inbox-title-row { display: flex; align-items: baseline; gap: 8px; }
.inbox-title-row h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; line-height: 1; }
.inbox-title-row .num { color: var(--text-3); font-weight: 500; font-size: 11px; letter-spacing: 0; }

.inbox-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab {
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: transparent; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.15s var(--ease);
}
.tab:hover { background: var(--bg-soft); color: var(--text); }
.tab.active { background: var(--text); color: var(--surface); }
.tab .num { opacity: 0.6; font-weight: 500; }
.tab.active .num { opacity: 0.75; }

.inbox-rows { flex: 1; overflow-y: auto; padding: 4px 6px 10px; }
.row {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.15s var(--ease);
  position: relative;
}
.row:hover { background: var(--bg-soft); }
.row.selected { background: var(--accent-soft); }
.row.selected::before {
  content: ''; position: absolute; left: 4px; top: 18%; bottom: 18%; width: 3px;
  background: var(--accent-grad); border-radius: 3px;
}

.row .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff;
  letter-spacing: -0.3px; flex-shrink: 0;
  box-shadow: 0 3px 10px var(--avatar-glow, var(--accent-glow));
  position: relative;
}

.row .body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.row .top { display: flex; align-items: center; gap: 8px; min-width: 0; }
.row .who {
  font-size: 13px; font-weight: 700; letter-spacing: -0.2px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
  display: flex; align-items: center; gap: 6px;
}
.row.unread .who::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent-grad); flex-shrink: 0;
}
.row .meta-time {
  font-size: 10px; color: var(--text-3);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
  font-family: var(--font-mono); font-weight: 500;
}
.row .subject {
  font-size: 12px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 500;
}
.row.unread .subject { color: var(--text); }
.row .preview {
  font-size: 11px; color: var(--text-3);
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  margin-top: 1px;
}
.row .footer { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.tag {
  font-size: 9.5px; font-weight: 600; padding: 2px 6px; border-radius: 5px;
  background: var(--bg-soft); color: var(--text-2);
  display: inline-flex; align-items: center; gap: 3px;
  letter-spacing: -0.01em;
}
.tag svg { width: 9px; height: 9px; }
.tag.danger { background: rgba(239, 68, 88, 0.10); color: var(--red); }
.tag.warn { background: rgba(255, 138, 61, 0.12); color: var(--orange); }
.tag.info { background: rgba(20, 184, 192, 0.12); color: var(--teal); }
.tag.success { background: rgba(26, 168, 108, 0.10); color: var(--green); }
.tag.ai { background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(6,214,160,0.12)); color: var(--pink); }
.row .mailbox-trail { display: inline-flex; gap: 0; margin-left: auto; }
.row .mailbox-trail .mb {
  width: 14px; height: 14px; border-radius: 50%;
  color: #fff; font-size: 8px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
  margin-left: -4px;
}
.row.selected .mailbox-trail .mb { border-color: var(--surface); }

.row[data-lane="act-now"] { --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.30); }
.row[data-lane="sprint"] { --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.row[data-lane="bookable"] { --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.row[data-lane="review"] { --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.row[data-lane="unclear"] { --avatar-grad: linear-gradient(135deg,#f5b400,#ffd166); --avatar-glow: rgba(245,180,0,0.28); }
.row[data-lane="later"] { --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

/* ===== Thread (flat, no card-on-card) ===== */
.thread {
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--surface);
  border-right: 1px solid var(--line);
}
.thread.empty { display: flex; align-items: center; justify-content: center; padding: 60px; }
.thread.empty .placeholder { text-align: center; color: var(--text-3); max-width: 380px; }
.thread.empty .empty-illustration {
  width: 72px; height: 72px; margin: 0 auto 18px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-grad); border-radius: 18px;
  color: #fff;
  box-shadow: 0 10px 24px var(--accent-glow);
  animation: floatY 3.5s ease-in-out infinite;
}
.thread.empty .empty-illustration svg { width: 32px; height: 32px; }
@keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.thread.empty h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); margin-bottom: 6px; }
.thread.empty p { font-size: 12.5px; line-height: 1.55; color: var(--text-2); }
.thread.empty .key {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  background: var(--bg-soft); border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  margin: 0 2px; font-weight: 600;
}

.thread-head {
  padding: 16px 22px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 8px;
  background: var(--surface);
}
.thread-head .top { display: flex; gap: 12px; align-items: flex-start; }
.thread-head .top h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; flex: 1; line-height: 1.3; }
.thread-head .lane-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--lane-color); background: var(--lane-bg);
  white-space: nowrap; flex-shrink: 0;
}
.thread-head .lane-pill svg { width: 10px; height: 10px; }
.thread-head .who-line { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-2); flex-wrap: wrap; }
.thread-head .ava {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9.5px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 5px var(--avatar-glow, var(--accent-glow));
}
.thread-head .who-line strong { color: var(--text); font-weight: 700; font-size: 12px; }
.thread-head .who-line .email { color: var(--text-3); font-family: var(--font-mono); font-size: 10.5px; }
.thread-head .who-line .meta-chip { display: inline-flex; align-items: center; gap: 4px; color: var(--text-2); font-size: 11px; }
.thread-head .who-line .meta-chip svg { width: 10px; height: 10px; color: var(--text-3); }
.thread-head .who-line .sep { color: var(--text-3); }

.lane-act-now { --lane-color: var(--red); --lane-bg: rgba(239, 68, 88, 0.12); --avatar-grad: linear-gradient(135deg,#ef4458,#ff8a3d); --avatar-glow: rgba(239,68,88,0.30); }
.lane-sprint { --lane-color: var(--green); --lane-bg: rgba(26, 168, 108, 0.12); --avatar-grad: linear-gradient(135deg,#1aa86c,#06d6a0); --avatar-glow: rgba(26,168,108,0.28); }
.lane-bookable { --lane-color: var(--teal); --lane-bg: rgba(20, 184, 192, 0.12); --avatar-grad: linear-gradient(135deg,#14b8c0,#4cc9f0); --avatar-glow: rgba(20,184,192,0.28); }
.lane-review { --lane-color: var(--orange); --lane-bg: rgba(255, 138, 61, 0.14); --avatar-grad: linear-gradient(135deg,#ff8a3d,#f5b400); --avatar-glow: rgba(255,138,61,0.28); }
.lane-unclear { --lane-color: var(--yellow); --lane-bg: rgba(245, 180, 0, 0.14); }
.lane-later { --lane-color: var(--purple); --lane-bg: rgba(139, 92, 246, 0.12); --avatar-grad: linear-gradient(135deg,#8b5cf6,#a78bfa); --avatar-glow: rgba(139,92,246,0.28); }

.thread-actions {
  padding: 7px 22px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 4px; flex-wrap: wrap;
  background: var(--surface);
}
.action {
  height: 26px; padding: 0 10px; border-radius: 7px;
  background: transparent;
  font-size: 11.5px; font-weight: 600; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s var(--ease);
}
.action svg { width: 12px; height: 12px; }
.action:hover { background: var(--bg-soft); color: var(--text); }
.action.primary {
  background: var(--accent-grad); color: #fff;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
}
.action.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35); }
.action.danger:hover { color: var(--red); }

/* Composer — hidden by default, revealed on Svara nu */
.composer-wrap {
  border-top: 1px solid var(--line);
  background: var(--surface);
  padding: 0 22px;
  position: sticky; bottom: 0;
  z-index: 4;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s var(--ease), padding 0.2s var(--ease);
}
.composer-wrap.is-open { max-height: 320px; padding: 12px 22px 14px; }
.composer {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.composer:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.composer-input {
  width: 100%;
  border: 0; outline: 0; resize: none;
  padding: 10px 12px;
  font-family: inherit; font-size: 13px; line-height: 1.5;
  color: var(--text); background: transparent;
  min-height: 60px; max-height: 200px;
}
.composer-input::placeholder { color: var(--text-3); }
.composer-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
  border-radius: 0 0 9px 9px;
}
.composer-bar .composer-hint { font-size: 10px; color: var(--text-3); padding: 0 4px; flex: 1; }
.composer-bar .send-btn {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 12px; height: 28px; border-radius: 7px;
  background: var(--accent-grad); color: #fff;
  font-size: 11.5px; font-weight: 700;
  box-shadow: 0 3px 10px rgba(108, 92, 231, 0.25);
  cursor: pointer; transition: all 0.15s var(--ease);
}
.composer-bar .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(108, 92, 231, 0.30); }
.composer-bar .send-btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.composer-bar .send-btn svg { width: 11px; height: 11px; }
.composer-status {
  font-size: 11px; color: var(--text-2);
  padding: 4px 4px 0;
}
.composer-status.error { color: var(--red); }
.composer-status.ok { color: var(--green); }

/* Messages — flat, no boxed cards */
.thread-body {
  flex: 1; overflow-y: auto;
  padding: 4px 0;
  background: var(--surface);
}
.messages { display: flex; flex-direction: column; }
.msg {
  padding: 14px 22px;
  border-bottom: 1px solid var(--line);
  animation: msgIn 0.4s var(--ease) backwards;
  position: relative;
}
.msg:last-child { border-bottom: 0; }
.msg:nth-child(1) { animation-delay: 0.05s; }
.msg:nth-child(2) { animation-delay: 0.15s; }
.msg:nth-child(3) { animation-delay: 0.25s; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.draft { background: linear-gradient(180deg, rgba(255,107,157,0.04), rgba(6,214,160,0.02)); }
.msg.draft::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--ai-grad);
  background-size: 200% 100%;
  animation: aiShimmer 3s linear infinite;
}
@keyframes aiShimmer { from { background-position: 0 0; } to { background-position: -200% 0; } }
.msg-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 8px;
}
.msg-head .left { display: flex; align-items: center; gap: 10px; }
.msg-head .ava {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg-soft); color: var(--text-2);
  font-size: 10px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.msg.outbound .msg-head .ava { background: var(--accent-grad); color: #fff; box-shadow: 0 2px 5px var(--accent-glow); }
.msg.draft .msg-head .ava { background: var(--ai-grad); color: #fff; }
.msg-head .from { font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -0.15px; }
.msg-head .time { font-size: 10.5px; color: var(--text-3); font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-weight: 500; }
.msg-head .badge {
  padding: 1px 7px; border-radius: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: 4px;
}
.msg-head .badge svg { width: 9px; height: 9px; }
.msg.outbound .msg-head .badge { background: rgba(26, 168, 108, 0.12); color: var(--green); }
.msg.inbound .msg-head .badge { background: var(--bg-soft); color: var(--text-2); }
.msg.draft .msg-head .badge { background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(6,214,160,0.12)); color: var(--pink); }
.msg-body {
  font-size: 13px; line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  padding-left: 36px;
}

/* ===== Context (right column, flat sections, no card-on-card) ===== */
.ctx-panel {
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 14px 16px;
  gap: 0;
}
.ctx-section { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
.ctx-section:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
.ctx-section .head {
  font-size: 9.5px; font-weight: 700; letter-spacing: 1px; color: var(--text-3);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 8px;
}
.ctx-section .head svg { width: 11px; height: 11px; }

.identity { display: flex; gap: 10px; align-items: center; }
.identity .ava {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--avatar-grad, var(--accent-grad));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12.5px; font-weight: 800; color: #fff;
  flex-shrink: 0; letter-spacing: -0.3px;
  box-shadow: 0 4px 12px var(--avatar-glow, var(--accent-glow));
}
.identity .who-name { font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -0.25px; }
.identity .email-line { font-size: 10.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); }

.kv-list { display: flex; flex-direction: column; gap: 7px; }
.kv-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.kv-item .label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); font-weight: 500; }
.kv-item .label svg { width: 11px; height: 11px; color: var(--text-3); }
.kv-item .val { font-size: 11.5px; color: var(--text); font-weight: 600; letter-spacing: -0.1px; text-align: right; }

.alert-box {
  padding: 9px 11px;
  border-radius: 9px;
  font-size: 11.5px; line-height: 1.5;
  color: var(--text);
}
.alert-box.risk { background: rgba(255, 138, 61, 0.08); border: 1px solid rgba(255, 138, 61, 0.20); }
.alert-box.next { background: rgba(26, 168, 108, 0.08); border: 1px solid rgba(26, 168, 108, 0.20); }

.timeline { list-style: none; position: relative; padding-left: 4px; }
.timeline::before {
  content: ''; position: absolute; left: 9px; top: 10px; bottom: 10px;
  width: 1.5px;
  background: linear-gradient(180deg, var(--accent), var(--line) 60%);
}
.timeline li { display: flex; gap: 10px; align-items: flex-start; padding: 5px 0; font-size: 11px; color: var(--text-2); position: relative; }
.timeline .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--line);
  margin-left: 6px;
  margin-top: 4px;
  flex-shrink: 0;
  z-index: 1;
}
.timeline li:first-child .dot { background: var(--accent-grad); border-color: transparent; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12); }

.mini-chart { display: flex; gap: 3px; align-items: end; height: 26px; }
.mini-chart .bar {
  flex: 1; background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 25%, transparent));
  border-radius: 2px;
  min-height: 3px;
}
.activity-meta { font-size: 11px; color: var(--text-2); margin-top: 7px; }
.activity-meta strong { color: var(--text); font-weight: 700; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 1280px) { .body { grid-template-columns: 184px 320px 1fr 244px; } }
@media (max-width: 1100px) { .body { grid-template-columns: 184px 320px 1fr; } .ctx-panel { display: none; } }
@media (max-width: 800px) { .body { grid-template-columns: 1fr; } .sidebar, .inbox-list { display: none; } }

  function bind() {
    document.addEventListener('click', ev=>{
      const tab = ev.target.closest('[data-tab]');
      if (tab) { state.tab = tab.dataset.tab; renderTabs(); renderRows(); return; }
      const row = ev.target.closest('.row[data-id]');
      if (row) { state.selectedId = row.dataset.id; renderRows(); renderThread(); return; }
      // Composer: open on "Svara nu"
      if (ev.target.closest('[data-focus-composer]')) {
        const wrap = document.getElementById('composer-wrap');
        if (wrap) {
          wrap.classList.add('is-open');
          setTimeout(()=>{ document.getElementById('composer-input')?.focus(); }, 80);
        }
        return;
      }
      // Composer: send button
      if (ev.target.closest('#send-btn')) { sendComposer(); return; }
    });
    document.addEventListener('keydown', ev=>{
      // Composer keys
      if (ev.target.id === 'composer-input') {
        if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') { ev.preventDefault(); sendComposer(); }
        if (ev.key === 'Escape') {
          const ta = ev.target; const wrap = document.getElementById('composer-wrap');
          if (ta && !ta.value.trim() && wrap) { wrap.classList.remove('is-open'); ta.blur(); }
        }
        return;
      }
      if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if (ev.metaKey && ev.key==='k') { ev.preventDefault(); $('#search-input').focus(); return; }
      const v = visibleThreads();
      const idx = v.findIndex(t=>t.id===state.selectedId);
      if (ev.key==='j'||ev.key==='ArrowDown') { ev.preventDefault(); const n=v[Math.min(v.length-1,idx+1)]||v[0]; if(n){state.selectedId=n.id;renderRows();renderThread();} }
      else if (ev.key==='k'||ev.key==='ArrowUp') { ev.preventDefault(); const p=v[Math.max(0,idx-1)]||v[0]; if(p){state.selectedId=p.id;renderRows();renderThread();} }
    });
  }

  // ==== Composer: send ====
  async function sendComposer() {
    const ta = document.getElementById('composer-input');
    const status = document.getElementById('composer-status');
    const btn = document.getElementById('send-btn');
    if (!ta) return;
    const text = (ta.value || '').trim();
    if (!text) {
      if (status) { status.textContent = 'Skriv ett meddelande först.'; status.className = 'composer-status error'; }
      ta.focus();
      return;
    }
    const t = state.threads.find(x => x.id === state.selectedId);
    if (!t) return;
    // Demo-läge: simulera
    if (!state.live) {
      if (status) { status.textContent = 'Demo-läge — mejlet skickades inte på riktigt.'; status.className = 'composer-status'; }
      ta.value = '';
      setTimeout(()=>{ document.getElementById('composer-wrap')?.classList.remove('is-open'); }, 1200);
      return;
    }
    // Live-läge: POST till backend
    const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
    if (!tok) {
      if (status) { status.textContent = 'Saknar admin-token (logga in via admin-flow först).'; status.className = 'composer-status error'; }
      return;
    }
    if (btn) btn.disabled = true;
    if (status) { status.textContent = 'Skickar…'; status.className = 'composer-status'; }
    try {
      const r = await fetch(`/api/v1/cco/runtime/conversation/${encodeURIComponent(t.id)}/reply`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: text })
      });
      const j = await r.json().catch(()=>({}));
      if (!r.ok || !j.ok) {
        const detail = j.detail || j.error || ('HTTP ' + r.status);
        if (status) { status.textContent = 'Skickning misslyckades: ' + detail; status.className = 'composer-status error'; }
        return;
      }
      if (status) {
        const recip = j.recipient ? ' till ' + j.recipient : '';
        status.textContent = 'Skickat ✓' + recip;
        status.className = 'composer-status ok';
      }
      ta.value = '';
      setTimeout(()=>{
        document.getElementById('composer-wrap')?.classList.remove('is-open');
        if (status) status.textContent = '';
      }, 1500);
    } catch (e) {
      if (status) { status.textContent = 'Nätverksfel: ' + (e?.message || e); status.className = 'composer-status error'; }
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function tryLoadLive() {
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok) return false;
      const r = await fetch('/api/v1/cco/runtime/worklist/consumer?limit=50', { headers:{Authorization:'Bearer '+tok} });
      if (!r.ok) return false;
      const j = await r.json();
      if (!j.ok || !Array.isArray(j.rows) || j.rows.length===0) return false;
      state.threads = j.rows.map(mapApiRow);
      state.selectedId = state.threads[0]?.id;
      state.live = true;
      const status = $('#conn-status');
      status.innerHTML = `<span class="status-dot"></span> Live · ${state.threads.length}`;
      return true;
    } catch (e) { return false; }
  }
  function mapApiRow(row) {
    const laneRaw = String(row.lane||'').toLowerCase().replace(/_/g,'-');
    const lane = ['act-now','sprint','bookable','review','unclear','later','medical'].includes(laneRaw)?laneRaw:'unclear';
    const laneIconMap = {'act-now':'i-bolt','sprint':'i-trend','bookable':'i-calendar','review':'i-eye','unclear':'i-question','later':'i-pause'};
    const laneLabelMap = {'act-now':'Agera nu','sprint':'Sprint','bookable':'Bokning','review':'Granska','unclear':'Oklart','later':'Senare','medical':'Medicinskt'};
    // API uses nested objects: customer.{name,email}, mailbox.{mailboxAddress,ownershipMailbox}, timing.{lastInboundAt,hoursSinceInbound}, state.{hasUnreadInbound}
    const customer = row.customer || {};
    const mailbox  = row.mailbox  || {};
    const timing   = row.timing   || {};
    const stateObj = row.state    || {};
    const customerEmail = customer.email || row.customerEmail || '';
    const customerName  = customer.name  || row.customerName  || '';
    const lastInboundAt = timing.lastInboundAt || row.lastInboundAt || '';
    const hasUnreadInbound = stateObj.hasUnreadInbound === true || row.hasUnreadInbound === true;
    const hoursSinceInbound = Number(timing.hoursSinceInbound ?? row.hoursSinceInbound ?? 0);
    const mailboxAddress = mailbox.mailboxAddress || row.mailboxAddress || '';
    const ownershipMailbox = mailbox.ownershipMailbox || row.ownershipMailbox || '';
    const conversationKey = row.id || row.conversationKey || row.conversation?.key || row.conversation?.mailboxConversationId;
    const who = customerName || customerEmail.split('@')[0] || 'Okänd';
    const initials = who.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
    // Format time as "HH:MM" if today, "Igår", or "DD MMM" otherwise
    const fmtTime = (iso) => {
      if (!iso) return '';
      const d = new Date(iso); if (isNaN(d.getTime())) return '';
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      const yesterday = new Date(now.getTime()-86400000);
      if (sameDay) return d.toLocaleTimeString('sv',{hour:'2-digit',minute:'2-digit'});
      if (d.toDateString() === yesterday.toDateString()) return 'Igår';
      return d.toLocaleDateString('sv',{day:'numeric',month:'short'});
    };
    return {
      id: conversationKey,
      lane, laneIcon: laneIconMap[lane]||'i-circle-dot',
      laneLabel: laneLabelMap[lane] || (lane[0].toUpperCase()+lane.slice(1)),
      unread: hasUnreadInbound, who, email: customerEmail, initials,
      mailbox: mailboxAddress.split('@')[0]||'Inkorg', mailboxTrail:[],
      subject: row.subject||'(utan ämne)', preview: row.preview || row.latestPreview || '',
      time: fmtTime(lastInboundAt),
      tags:[],
      conversation:[{from:who,dir:'inbound',time:lastInboundAt,initials,body: row.preview || row.latestPreview || ''}],
      timeline:[], risk:'',
      nextStep: hasUnreadInbound?'Svara nu':'Granska tråden',
      lifecycle: hasUnreadInbound?'Olast':'Aktiv', followUp:'—',
      riskLevel: hoursSinceInbound>24?'Hög':'Låg',
      owner: ownershipMailbox.split('@')[0]||'—',
    };
  }

  async function loadConversationMessages(thread) {
    if (!thread || thread.conversationLoading) return;
    thread.conversationLoading = true;
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok || !thread.id) return;
      const r = await fetch(`/api/v1/cco/runtime/conversation/${encodeURIComponent(thread.id)}/messages`, {
        headers:{ Authorization:'Bearer '+tok }
      });
      if (!r.ok) return;
      const j = await r.json();
      if (!j.ok || !Array.isArray(j.messages)) return;
      const fmtRel = (iso)=>{
        if (!iso) return '';
        const d = new Date(iso); if (isNaN(d.getTime())) return '';
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        const yesterday = new Date(now.getTime()-86400000);
        const t = d.toLocaleTimeString('sv',{hour:'2-digit',minute:'2-digit'});
        if (sameDay) return `Idag · ${t}`;
        if (d.toDateString() === yesterday.toDateString()) return `Igår · ${t}`;
        return `${d.toLocaleDateString('sv',{day:'numeric',month:'short'})} · ${t}`;
      };
      thread.conversation = j.messages.map(m=>({
        from: m.from || '(okänd)',
        dir: m.dir === 'outbound' ? 'outbound' : (m.dir === 'draft' ? 'draft' : 'inbound'),
        time: fmtRel(m.time),
        initials: m.initials || '?',
        body: m.body || ''
      }));
      thread.conversationLoaded = true;
      // Re-render only if this is still the selected thread
      if (state.selectedId === thread.id) renderThread();
      // Also kick off AI-summary load (non-blocking)
      loadConversationSummary(thread);
    } catch (_e) { /* swallow */ }
    finally { thread.conversationLoading = false; }
  }
  async function loadConversationSummary(thread) {
    if (!thread || thread.summaryLoading || thread.summaryLoaded) return;
    thread.summaryLoading = true;
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok || !thread.id) return;
      const r = await fetch(`/api/v1/cco/runtime/conversation/${encodeURIComponent(thread.id)}/summary`, {
        headers:{ Authorization:'Bearer '+tok }
      });
      if (!r.ok) return;
      const j = await r.json();
      if (!j.ok || !j.summary) return;
      const s = j.summary;
      // AI-summary block uses aiTldr (headline) + aiPoints (bullets)
      thread.aiTldr = s.headline || '';
      thread.aiPoints = Array.isArray(s.bullets) ? s.bullets : [];
      // Right context panel uses risk + nextStep
      if (s.risk) thread.risk = s.risk;
      if (s.nextStep) thread.nextStep = s.nextStep;
      thread.summaryLoaded = true;
      if (state.selectedId === thread.id) renderThread();
    } catch (_e) { /* swallow */ }
    finally { thread.summaryLoading = false; }
  }

  async function init() { bind(); await tryLoadLive(); renderAll(); }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>
