<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCO — Hair TP Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Background gradient (macOS Sequoia / iOS 18 wallpaper feel) */
  --bg-1: #fdfaff;
  --bg-2: #f6f0ff;
  --bg-3: #fef0f6;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-solid: #ffffff;
  --surface-2: rgba(255, 255, 255, 0.55);
  --surface-3: rgba(247, 245, 252, 0.85);
  --surface-hover: rgba(255, 255, 255, 0.92);
  --line: rgba(20, 18, 32, 0.08);
  --line-2: rgba(20, 18, 32, 0.14);
  --text: #0a0612;
  --text-2: #4a4458;
  --text-3: #8b8595;
  --accent: #6c5ce7;
  --accent-2: #5848d6;
  --accent-3: #4837c8;
  --accent-soft: rgba(108, 92, 231, 0.08);
  --accent-glow: rgba(108, 92, 231, 0.32);
  --accent-grad: linear-gradient(135deg, #6c5ce7 0%, #ec4899 100%);
  --red: #ef4458;
  --orange: #ff8a3d;
  --yellow: #f5b400;
  --green: #1aa86c;
  --teal: #14b8c0;
  --pink: #ec4899;
  --purple: #8b5cf6;
  --indigo: #6366f1;
  --font-sans: "Inter", -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
  --shadow-xs: 0 1px 2px rgba(20, 18, 32, 0.04);
  --shadow-sm: 0 1px 3px rgba(20, 18, 32, 0.05), 0 4px 8px -2px rgba(20, 18, 32, 0.06);
  --shadow-md: 0 2px 4px rgba(20, 18, 32, 0.06), 0 12px 24px -4px rgba(20, 18, 32, 0.10);
  --shadow-lg: 0 8px 16px rgba(20, 18, 32, 0.08), 0 24px 56px -8px rgba(20, 18, 32, 0.16);
  --shadow-glow: 0 0 0 4px rgba(108, 92, 231, 0.12), 0 8px 20px rgba(108, 92, 231, 0.20);
  --blur: saturate(180%) blur(20px);
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg-1);
  background-image:
    radial-gradient(at 8% 0%, var(--bg-3) 0px, transparent 55%),
    radial-gradient(at 100% 0%, var(--bg-2) 0px, transparent 50%),
    radial-gradient(at 50% 100%, #f0f7ff 0px, transparent 60%);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  letter-spacing: -0.011em;
}
button, input, select { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: 0; }
button { cursor: pointer; }
::selection { background: var(--accent-soft); color: var(--accent-3); }

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
}

/* ===== Top bar (frosted) ===== */
.topbar {
  display: grid;
  grid-template-columns: 240px 1fr 320px;
  align-items: center;
  padding: 0 14px;
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--line);
  gap: 16px;
  position: relative;
  z-index: 50;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 14.5px; letter-spacing: -0.3px;
  color: var(--text);
}
.brand .logo {
  width: 28px; height: 28px; border-radius: 9px;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff; font-weight: 800;
  box-shadow: 0 8px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.4);
}
.brand .sep { color: var(--text-3); margin: 0 2px; font-weight: 400; }
.brand .ctx { color: var(--text-2); font-weight: 500; font-size: 12.5px; }

.search { position: relative; max-width: 480px; margin: 0 auto; width: 100%; }
.search input {
  width: 100%; height: 34px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 0 14px 0 38px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: all 0.2s var(--ease);
  font-weight: 400;
}
.search input::placeholder { color: var(--text-3); }
.search input:focus {
  background: var(--surface-solid);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow);
}
.search .icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); font-size: 14px; pointer-events: none;
}
.search kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-sans); font-size: 10px; color: var(--text-3);
  background: rgba(255, 255, 255, 0.85); padding: 2px 6px; border-radius: 5px;
  border: 1px solid var(--line);
  font-weight: 500;
}

.topbar-actions { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.2s var(--ease);
}
.icon-btn:hover { background: rgba(255,255,255,0.8); color: var(--text); transform: scale(1.05); }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(26, 168, 108, 0.18), 0 0 12px var(--green);
  animation: pulse 2.4s ease-in-out infinite;
}
.status-dot.demo { background: var(--yellow); box-shadow: 0 0 0 3px rgba(245, 180, 0, 0.18), 0 0 12px rgba(245, 180, 0, 0.5); }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.9); opacity: 0.7; }
}
.status-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 30px; border-radius: 999px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border: 1px solid var(--line);
  font-size: 11.5px; color: var(--text-2); font-weight: 600;
  letter-spacing: -0.01em;
}
.compose-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 32px; border-radius: 10px;
  background: var(--accent-grad);
  color: #fff;
  font-size: 13px; font-weight: 600;
  transition: all 0.2s var(--ease);
  letter-spacing: -0.01em;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.25);
  position: relative;
  overflow: hidden;
}
.compose-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.compose-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.40), inset 0 1px 0 rgba(255,255,255,0.30); }
.compose-btn:active { transform: translateY(0); }

/* ===== Body ===== */
.body {
  display: grid;
  grid-template-columns: 220px 1fr;
  overflow: hidden;
  padding: 12px;
  gap: 12px;
}

/* ===== Sidebar (glass card) ===== */
.sidebar {
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--line);
  border-radius: 16px;
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 10px;
  gap: 14px;
  box-shadow: var(--shadow-sm);
}
.sidebar-section {}
.sidebar-section + .sidebar-section { padding-top: 12px; border-top: 1px solid var(--line); }
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  color: var(--text-3); text-transform: uppercase;
  padding: 0 8px 6px; display: flex; justify-content: space-between; align-items: center;
}
.sidebar-label .add {
  width: 18px; height: 18px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 14px;
}
.sidebar-label .add:hover { background: var(--surface-2); color: var(--text); }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 9px; border-radius: 8px;
  color: var(--text-2);
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  width: 100%; text-align: left;
  letter-spacing: -0.01em;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.7); color: var(--text); }
.nav-item.active {
  background: var(--accent-grad); color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.2);
}
.nav-item.active .count { background: rgba(255,255,255,0.22); color: #fff; }
.nav-item .icon { width: 14px; flex-shrink: 0; opacity: 0.85; font-size: 13px; }
.nav-item .label { flex: 1; }
.nav-item .count {
  font-size: 10.5px; color: var(--text-3); font-weight: 600;
  font-variant-numeric: tabular-nums;
  background: rgba(20, 18, 32, 0.05);
  padding: 1px 6px; border-radius: 5px;
  min-width: 22px; text-align: center;
}
.nav-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }

/* ===== Inbox + Thread (single glass shell) ===== */
.workspace {
  display: grid;
  grid-template-columns: 360px 1fr;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.inbox-list {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
  background: rgba(255,255,255,0.35);
}
.inbox-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 5;
}
.inbox-title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.6px;
  display: flex; align-items: baseline; gap: 8px;
  color: var(--text);
}
.inbox-title .num { color: var(--text-3); font-weight: 500; font-size: 12.5px; letter-spacing: 0; }
.inbox-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab {
  padding: 4px 10px; border-radius: 7px;
  font-size: 11.5px; font-weight: 600;
  background: transparent; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.2s var(--ease);
  letter-spacing: -0.01em;
}
.tab:hover { background: rgba(255,255,255,0.7); color: var(--text); }
.tab.active {
  background: var(--text); color: var(--surface-solid);
  box-shadow: 0 2px 8px rgba(20, 18, 32, 0.20);
}
.tab .num { opacity: 0.55; font-weight: 500; }
.tab.active .num { opacity: 0.7; }

.inbox-rows { flex: 1; overflow-y: auto; padding: 6px; }
.row {
  display: grid;
  grid-template-columns: 3px 1fr;
  gap: 0;
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  position: relative;
  background: transparent;
  margin-bottom: 3px;
  overflow: hidden;
}
.row:hover {
  background: rgba(255,255,255,0.85);
  transform: translateY(-1px);
  box-shadow: var(--shadow-xs);
}
.row.selected {
  background: var(--surface-solid);
  box-shadow: var(--shadow-md), inset 0 0 0 1px var(--accent-soft);
  transform: translateY(0);
}
.row.selected::before {
  content: ''; position: absolute; left: 0; top: 12%; bottom: 12%; width: 3px;
  background: var(--accent-grad); border-radius: 0 3px 3px 0;
}
.row .lane-bar { background: var(--lane-color, transparent); opacity: 0.55; transition: opacity 0.2s; }
.row.selected .lane-bar { opacity: 0; }
.row .body {
  padding: 11px 14px;
  display: flex; flex-direction: column; gap: 4px;
  min-width: 0;
}
.row .top { display: flex; align-items: center; gap: 8px; min-width: 0; }
.row .lane-tag {
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.7px;
  text-transform: uppercase;
  color: var(--lane-color, var(--text-2));
}
.row .meta-time {
  margin-left: auto; font-size: 10.5px; color: var(--text-3);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
  font-family: var(--font-mono); font-weight: 500;
}
.row .who {
  font-size: 14px; font-weight: 700; letter-spacing: -0.25px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.row.unread .who::after {
  content: ''; display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--accent-grad); flex-shrink: 0;
  box-shadow: 0 0 8px var(--accent-glow);
}
.row .subject {
  font-size: 12.5px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 400;
}
.row.unread .subject { color: var(--text); font-weight: 500; }
.row .preview {
  font-size: 11.5px; color: var(--text-3);
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  overflow: hidden;
}
.row .footer {
  display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
  margin-top: 3px;
}
.tag {
  font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 5px;
  background: var(--surface-3); color: var(--text-2); letter-spacing: -0.01em;
  display: inline-flex; align-items: center; gap: 4px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.tag.danger { background: rgba(239, 68, 88, 0.10); color: var(--red); }
.tag.warn { background: rgba(255, 138, 61, 0.12); color: var(--orange); }
.tag.info { background: rgba(20, 184, 192, 0.12); color: var(--teal); }
.tag.success { background: rgba(26, 168, 108, 0.10); color: var(--green); }

.row .mailbox-trail { display: inline-flex; gap: 0; margin-left: auto; }
.row .mailbox-trail .mb {
  width: 17px; height: 17px; border-radius: 50%;
  color: #fff;
  font-size: 9px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
  margin-left: -5px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.10);
}

/* ===== Thread ===== */
.thread {
  display: flex; flex-direction: column;
  overflow: hidden;
  background: rgba(255,255,255,0.55);
}
.thread.empty { display: flex; align-items: center; justify-content: center; padding: 60px; }
.thread.empty .placeholder { text-align: center; color: var(--text-3); max-width: 360px; }
.thread.empty .placeholder .key {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  background: var(--surface-solid); border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  margin: 0 2px; font-weight: 500;
  box-shadow: var(--shadow-xs);
}
.thread.empty h3 { font-size: 24px; font-weight: 800; letter-spacing: -0.6px; color: var(--text); margin-bottom: 10px; }
.thread.empty p { font-size: 13.5px; line-height: 1.6; color: var(--text-2); }

.thread-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 5;
}
.thread-head .top { display: flex; gap: 14px; align-items: flex-start; }
.thread-head .top h2 {
  font-size: 22px; font-weight: 800; letter-spacing: -0.6px;
  flex: 1; color: var(--text); line-height: 1.25;
}
.thread-head .lane-pill {
  padding: 5px 11px; border-radius: 8px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--lane-color); background: var(--lane-bg);
  white-space: nowrap;
  flex-shrink: 0;
  border: 1px solid color-mix(in srgb, var(--lane-color) 25%, transparent);
}
.thread-head .who-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-2);
  flex-wrap: wrap;
}
.thread-head .avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #fff;
  letter-spacing: 0;
  box-shadow: 0 2px 6px var(--accent-glow);
}
.thread-head .who-line strong { color: var(--text); font-weight: 700; font-size: 13px; }
.thread-head .who-line .email { color: var(--text-3); font-family: var(--font-mono); font-size: 11px; font-weight: 400; }
.thread-head .who-line .sep { color: var(--text-3); margin: 0 1px; }

.thread-actions {
  padding: 10px 22px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 6px; flex-wrap: wrap;
  background: rgba(255,255,255,0.45);
}
.action {
  height: 30px; padding: 0 12px; border-radius: 9px;
  background: rgba(255,255,255,0.7); border: 1px solid var(--line);
  font-size: 12px; font-weight: 600; color: var(--text-2);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.2s var(--ease);
  letter-spacing: -0.01em;
  backdrop-filter: blur(6px);
}
.action:hover {
  background: var(--surface-solid); color: var(--text);
  border-color: var(--line-2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-xs);
}
.action.primary {
  background: var(--accent-grad); color: #fff; border-color: transparent;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30), inset 0 1px 0 rgba(255,255,255,0.20);
}
.action.primary:hover {
  background: var(--accent-grad);
  box-shadow: 0 8px 20px rgba(108, 92, 231, 0.40), inset 0 1px 0 rgba(255,255,255,0.25);
  transform: translateY(-1px);
}
.action.danger:hover { color: var(--red); border-color: rgba(239, 68, 88, 0.3); }

.thread-body {
  flex: 1; overflow-y: auto;
  padding: 18px 22px;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
  align-items: start;
}
@media (max-width: 1180px) {
  .thread-body { grid-template-columns: 1fr; }
  .thread-body .ctx { display: none; }
}

.messages { display: flex; flex-direction: column; gap: 12px; }
.msg {
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface-solid);
  box-shadow: var(--shadow-xs);
  transition: all 0.2s var(--ease);
  animation: msgIn 0.4s var(--ease) backwards;
}
.msg:nth-child(1) { animation-delay: 0.05s; }
.msg:nth-child(2) { animation-delay: 0.15s; }
.msg:nth-child(3) { animation-delay: 0.25s; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg:hover { box-shadow: var(--shadow-sm); }
.msg-head {
  padding: 11px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(247,245,252,0.55));
}
.msg-head .left { display: flex; align-items: center; gap: 10px; }
.msg-head .avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface-3); color: var(--text-2);
  font-size: 10px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
}
.msg-head .from { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.15px; }
.msg-head .time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-weight: 500; }
.msg-head .badge {
  padding: 2px 8px; border-radius: 5px;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
}
.msg.outbound .msg-head .badge { background: rgba(26, 168, 108, 0.12); color: var(--green); }
.msg.outbound .msg-head .avatar { background: var(--accent-grad); color: #fff; box-shadow: 0 2px 6px var(--accent-glow); }
.msg.inbound .msg-head .badge { background: rgba(20, 18, 32, 0.06); color: var(--text-2); }
.msg.draft .msg-head .badge { background: rgba(255, 138, 61, 0.14); color: var(--orange); }
.msg.draft { border-color: rgba(255, 138, 61, 0.25); }
.msg-body {
  padding: 14px 18px;
  font-size: 13.5px; line-height: 1.65;
  color: var(--text);
  white-space: pre-wrap;
}

/* ===== Context cards ===== */
.ctx { display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; }
.ctx-card {
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-solid);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  transition: all 0.2s var(--ease);
  animation: msgIn 0.4s var(--ease) backwards;
}
.ctx-card:nth-child(1) { animation-delay: 0.30s; }
.ctx-card:nth-child(2) { animation-delay: 0.35s; }
.ctx-card:nth-child(3) { animation-delay: 0.40s; }
.ctx-card:nth-child(4) { animation-delay: 0.45s; }
.ctx-card:nth-child(5) { animation-delay: 0.50s; }
.ctx-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.ctx-card .head {
  padding: 9px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 9.5px; font-weight: 800; letter-spacing: 1px; color: var(--text-3);
  text-transform: uppercase;
}
.ctx-card .body { padding: 14px; }
.ctx-card .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ctx-card .item .label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.7px; text-transform: uppercase; font-weight: 800; margin-bottom: 3px; }
.ctx-card .item .val { font-size: 12.5px; color: var(--text); font-weight: 700; letter-spacing: -0.1px; }
.ctx-card.risk { background: linear-gradient(180deg, rgba(255, 138, 61, 0.06) 0%, var(--surface-solid) 100%); border-color: rgba(255, 138, 61, 0.3); }
.ctx-card.risk .head { color: var(--orange); }
.ctx-card.next { background: linear-gradient(180deg, rgba(26, 168, 108, 0.06) 0%, var(--surface-solid) 100%); border-color: rgba(26, 168, 108, 0.3); }
.ctx-card.next .head { color: var(--green); }
.ctx-card .text { font-size: 12.5px; line-height: 1.55; color: var(--text); }

.timeline { list-style: none; }
.timeline li {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 7px 0;
  font-size: 12px;
  color: var(--text-2);
  border-bottom: 1px solid var(--line);
}
.timeline li:last-child { border-bottom: 0; padding-bottom: 0; }
.timeline li:first-child { padding-top: 0; }
.timeline .num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--surface-3); color: var(--text-2);
  font-size: 10px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.timeline li:first-child .num { background: var(--accent-grad); color: #fff; border-color: transparent; box-shadow: 0 2px 6px var(--accent-glow); }

.identity { display: flex; gap: 12px; align-items: center; }
.identity .ava {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent-grad);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  flex-shrink: 0; letter-spacing: -0.3px;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.identity .who-name { font-size: 14.5px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.identity .email-line { font-size: 11.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); font-weight: 400; }

/* ===== Lane colors ===== */
.row[data-lane="act-now"], .lane-act-now { --lane-color: var(--red); --lane-bg: rgba(239, 68, 88, 0.10); }
.row[data-lane="sprint"], .lane-sprint { --lane-color: var(--green); --lane-bg: rgba(26, 168, 108, 0.10); }
.row[data-lane="bookable"], .lane-bookable { --lane-color: var(--teal); --lane-bg: rgba(20, 184, 192, 0.10); }
.row[data-lane="review"], .lane-review { --lane-color: var(--orange); --lane-bg: rgba(255, 138, 61, 0.12); }
.row[data-lane="unclear"], .lane-unclear { --lane-color: var(--yellow); --lane-bg: rgba(245, 180, 0, 0.14); }
.row[data-lane="later"], .lane-later { --lane-color: var(--purple); --lane-bg: rgba(139, 92, 246, 0.10); }
.row[data-lane="medical"], .lane-medical { --lane-color: var(--pink); --lane-bg: rgba(236, 72, 153, 0.10); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 1280px) { .body { grid-template-columns: 200px 1fr; } }
@media (max-width: 1000px) { .workspace { grid-template-columns: 320px 1fr; } }
@media (max-width: 800px) {
  .body { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .workspace { grid-template-columns: 1fr; }
}

              <div class="grid">
                <div class="item"><div class="label">Livscykel</div><div class="val">${escHtml(t.lifecycle)}</div></div>
                <div class="item"><div class="label">Status</div><div class="val">${escHtml(t.laneLabel)}</div></div>
                <div class="item"><div class="label">Uppföljning</div><div class="val">${escHtml(t.followUp)}</div></div>
                <div class="item"><div class="label">Risk</div><div class="val">${escHtml(t.riskLevel)}</div></div>
              </div>
            </div>
          </div>
          ${t.risk?`<div class="ctx-card risk"><div class="head">Risk</div><div class="body"><div class="text">${escHtml(t.risk)}</div></div></div>`:''}
          ${t.nextStep?`<div class="ctx-card next"><div class="head">Nästa steg</div><div class="body"><div class="text">${escHtml(t.nextStep)}</div></div></div>`:''}
          ${tl?`<div class="ctx-card"><div class="head">Tidslinje</div><div class="body"><ul class="timeline">${tl}</ul></div></div>`:''}
        </aside>
      </div>`;
  }
  function renderAll() { renderTabs(); renderRows(); renderThread(); }

  function bind() {
    document.addEventListener('click', ev=>{
      const tab = ev.target.closest('[data-tab]');
      if (tab) { state.tab = tab.dataset.tab; renderTabs(); renderRows(); return; }
      const row = ev.target.closest('.row[data-id]');
      if (row) { state.selectedId = row.dataset.id; renderRows(); renderThread(); return; }
    });
    document.addEventListener('keydown', ev=>{
      if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if (ev.metaKey && ev.key==='k') { ev.preventDefault(); $('#search-input').focus(); return; }
      const v = visibleThreads();
      const idx = v.findIndex(t=>t.id===state.selectedId);
      if (ev.key==='j'||ev.key==='ArrowDown') { ev.preventDefault(); const n=v[Math.min(v.length-1,idx+1)]||v[0]; if(n){state.selectedId=n.id;renderRows();renderThread();} }
      else if (ev.key==='k'||ev.key==='ArrowUp') { ev.preventDefault(); const p=v[Math.max(0,idx-1)]||v[0]; if(p){state.selectedId=p.id;renderRows();renderThread();} }
    });
  }

  async function tryLoadLive() {
    try {
      const tok = (()=>{ try{return localStorage.getItem('ARCANA_ADMIN_TOKEN')||'';}catch{return '';} })();
      if (!tok) return false;
      const r = await fetch('/api/v1/cco/runtime/worklist/consumer?limit=50', { headers:{Authorization:'Bearer '+tok} });
      if (!r.ok) return false;
      const j = await r.json();
      if (!j.ok || !Array.isArray(j.rows) || j.rows.length===0) return false;
      state.threads = j.rows.map(mapApiRow);
      state.selectedId = state.threads[0]?.id;
      state.live = true;
      const status = $('#conn-status');
      status.innerHTML = `<span class="status-dot"></span> Live · ${state.threads.length}`;
      return true;
    } catch (e) { return false; }
  }
  function mapApiRow(row) {
    const laneRaw = String(row.lane||'').toLowerCase().replace(/_/g,'-');
    const lane = ['act-now','sprint','bookable','review','unclear','later','medical'].includes(laneRaw)?laneRaw:'unclear';
    const who = row.customerName || row.customerEmail?.split('@')[0] || 'Okänd';
    const initials = who.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
    return {
      id: row.conversationKey||row.mailboxConversationId,
      lane, laneLabel: lane==='act-now'?'Agera nu':lane[0].toUpperCase()+lane.slice(1),
      unread: row.hasUnreadInbound===true, who, email: row.customerEmail||'', initials,
      mailbox: row.mailboxAddress?.split('@')[0]||'Inkorg', mailboxTrail:[],
      subject: row.subject||'(utan ämne)', preview: row.latestPreview||'',
      time: row.lastInboundAt?new Date(row.lastInboundAt).toLocaleString('sv',{hour:'2-digit',minute:'2-digit'}):'',
      tags:[], conversation:[{from:who,dir:'inbound',time:row.lastInboundAt||'',initials,body:row.latestPreview||''}],
      timeline:[], risk:'', nextStep: row.hasUnreadInbound?'Svara nu':'Granska tråden',
      lifecycle: row.hasUnreadInbound?'Olast':'Aktiv', followUp:'—',
      riskLevel: row.hoursSinceInbound>24?'Hög':'Låg', owner: row.ownershipMailbox?.split('@')[0]||'—',
    };
  }

  async function init() { bind(); await tryLoadLive(); renderAll(); }
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>

</body>
</html>
