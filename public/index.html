<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcana · Hair TP Clinic</title>
  <link rel="icon" type="image/png" href="/assets/major-arcana-mark-img0182-clean-v3.png" />
  <link rel="apple-touch-icon" href="/assets/major-arcana-mark-img0182-clean-v3.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="cliento-custom-theme min-h-screen text-[color:var(--arcana-text)]">
  <div class="mx-auto flex min-h-screen max-w-3xl flex-col">
    <header class="glass-surface glass-header sticky top-0 z-10 border-b border-[color:var(--arcana-border)] px-4 py-4 backdrop-blur">
      <div class="flex items-center justify-between gap-3">
        <div class="flex min-w-0 items-center gap-3">
          <img
            id="brandMark"
            src="/assets/major-arcana-mark-img0182-clean-v3.png"
            alt=""
            class="h-[108px] w-[108px] shrink-0 opacity-95"
            loading="eager"
            decoding="async"
          />
          <div class="min-w-0">
            <div class="brand-display text-lg leading-tight">Arcana</div>
            <div id="brandSubtitle" class="text-sm text-[color:var(--arcana-text-muted)]">Hair TP Clinic · chat & bokning</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="newChatBtn" class="btn-ghost rounded-lg px-3 py-2 text-sm">
            Ny chatt
          </button>
          <button id="bookBtn" class="btn-primary rounded-lg px-3 py-2 text-sm font-medium">
            Boka tid
          </button>
        </div>
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        <button class="chip" data-chip="prices" data-suggest="Vad kostar en konsultation?">Priser</button>
        <button class="chip" data-chip="process" data-suggest="Hur går en konsultation till?">Behandling</button>
        <button class="chip" data-chip="aftercare" data-suggest="Vad ska jag tänka på efter en behandling?">Eftervård</button>
        <button class="chip" data-action="open-booking">Boka konsultation</button>
      </div>
    </header>

    <main class="flex-1 px-4 py-6">
      <div class="panel glass-panel p-4 sm:p-5">
        <div id="messages" class="space-y-4"></div>
      </div>
    </main>

    <footer class="glass-surface glass-footer sticky bottom-0 border-t border-[color:var(--arcana-border)] px-4 py-4 backdrop-blur">
      <div class="flex items-end gap-2">
        <textarea
          id="messageInput"
          rows="2"
          placeholder="Skriv din fråga…"
          class="input brand-focus min-h-[44px] flex-1 resize-none rounded-xl px-3 py-2 text-sm focus:outline-none"
        ></textarea>
        <button
          id="sendBtn"
          class="btn-primary h-[44px] rounded-xl px-4 text-sm font-medium disabled:cursor-not-allowed disabled:opacity-60"
        >
          Skicka
        </button>
      </div>
      <div class="mt-2 text-xs text-[color:var(--arcana-text-muted)]">
        Vid medicinska frågor: rådgör med kliniken. Vid akuta symtom: ring 112.
      </div>
    </footer>
  </div>

  <!-- Booking modal (Cliento widget) -->
  <div id="bookingModal" class="fixed inset-0 z-50 hidden">
    <div id="bookingBackdrop" class="absolute inset-0 bg-black/70"></div>
    <div class="relative mx-auto flex h-full max-w-3xl flex-col p-4">
      <div class="glass-surface glass-modal-top flex items-center justify-between rounded-t-2xl border border-[color:var(--arcana-border)] px-5 py-4 backdrop-blur sm:px-6">
        <div class="flex min-w-0 items-center gap-4">
          <img
            id="bookingBrandMark"
            src="/assets/major-arcana-mark-img0182-clean-v3.png"
            alt=""
            class="h-20 w-20 shrink-0 opacity-95"
            loading="lazy"
            decoding="async"
          />
          <div class="min-w-0">
            <div class="text-base font-semibold leading-tight text-[color:var(--arcana-text)]">Boka tid</div>
            <div class="mt-0.5 text-sm leading-tight text-[color:var(--arcana-text-muted)]">Öppnas via Cliento</div>
          </div>
        </div>
        <button id="bookingCloseBtn" class="btn-ghost self-start rounded-lg px-4 py-2 text-sm">
          Stäng
        </button>
      </div>
      <div class="glass-booking-body flex-1 overflow-auto rounded-b-2xl border border-t-0 border-[color:rgba(15,10,9,0.16)] bg-white text-slate-900">
        <div id="clientoMount" class="min-h-full p-2">
          <div class="p-4 text-sm text-slate-700">Laddar bokning…</div>
        </div>
      </div>
      <div class="mt-2 text-xs text-[color:var(--arcana-text-muted)]">
        Tips: om du inte hittar en tid som passar kan du skriva här så hjälper vi dig vidare.
      </div>
    </div>
  </div>

  <style>
    /* Cliento theming (via CSS vars) */
    .cliento-custom-theme {
      /* Defaults overridden per brand in public/app.js */
      --arcana-primary: #cabaae;
      --arcana-primary-hover: #d7c9be;
      --arcana-primary-text: #303030;
      --arcana-primary-rgb: 202, 186, 174;

      --arcana-bg: #303030;
      --arcana-surface: rgba(48, 48, 48, 0.72);
      --arcana-surface-solid: rgba(38, 38, 38, 0.76);
      --arcana-text: #f6f1ee;
      --arcana-text-muted: rgba(246, 241, 238, 0.72);
      --arcana-border: rgba(246, 241, 238, 0.14);
      --arcana-glow: rgba(202, 186, 174, 0.22);
      --arcana-glass-edge: rgba(246, 241, 238, 0.2);
      --arcana-glass-highlight: rgba(255, 255, 255, 0.16);
      --arcana-glass-layer-a: rgba(255, 255, 255, 0.12);
      --arcana-glass-layer-b: rgba(255, 255, 255, 0.03);
      --arcana-shadow-3d: 0 18px 36px rgba(0, 0, 0, 0.42), 0 6px 12px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.14);

      --cb-color-primary: var(--arcana-primary);
      --cb-color-secondary: #0f172a; /* slate-900 */
      --cb-color-text: #0f172a;
      --cb-color-background: #ffffff;
      --cb-color-muted: #64748b; /* slate-500 */
    }

    body {
      font-family: "Jost", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(900px 500px at 15% -10%, var(--arcana-glow) 0%, transparent 60%),
        radial-gradient(900px 500px at 95% 0%, rgba(255, 255, 255, 0.04) 0%, transparent 60%),
        var(--arcana-bg);
    }

    .brand-display {
      font-family: "Cormorant Garamond", ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .panel {
      border: 1px solid var(--arcana-border);
      background:
        linear-gradient(160deg, var(--arcana-glass-layer-a), var(--arcana-glass-layer-b)),
        var(--arcana-surface-solid);
      border-radius: 24px;
      box-shadow: var(--arcana-shadow-3d);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
    }

    .glass-surface {
      background:
        linear-gradient(155deg, var(--arcana-glass-layer-a), var(--arcana-glass-layer-b)),
        var(--arcana-surface);
      border-color: var(--arcana-glass-edge) !important;
      box-shadow: var(--arcana-shadow-3d);
      backdrop-filter: blur(14px) saturate(132%);
      -webkit-backdrop-filter: blur(14px) saturate(132%);
    }

    .glass-header,
    .glass-footer {
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
    }

    .glass-panel {
      border-color: var(--arcana-glass-edge);
    }

    .glass-modal-top {
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 var(--arcana-glass-highlight);
    }

    .glass-booking-body {
      box-shadow: 0 22px 42px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .btn-primary {
      border: 1px solid rgba(var(--arcana-primary-rgb), 0.5);
      background: linear-gradient(
        160deg,
        rgba(var(--arcana-primary-rgb), 0.82),
        rgba(var(--arcana-primary-rgb), 0.66)
      );
      color: var(--arcana-primary-text);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.26);
      backdrop-filter: blur(10px) saturate(138%);
      -webkit-backdrop-filter: blur(10px) saturate(138%);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }
    .btn-primary:hover {
      border-color: rgba(var(--arcana-primary-rgb), 0.62);
      filter: brightness(1.03);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }
    .btn-primary:active { transform: translateY(1px); }

    .btn-ghost {
      border: 1px solid var(--arcana-glass-edge);
      color: var(--arcana-text);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28), inset 0 1px 0 var(--arcana-glass-highlight);
      backdrop-filter: blur(10px) saturate(128%);
      -webkit-backdrop-filter: blur(10px) saturate(128%);
      transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }
    .btn-ghost:hover {
      transform: translateY(-1px);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
      border-color: rgba(var(--arcana-primary-rgb), 0.4);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .input {
      border: 1px solid var(--arcana-glass-edge);
      background:
        linear-gradient(160deg, rgba(12, 10, 9, 0.68), rgba(12, 10, 9, 0.52));
      color: var(--arcana-text);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px) saturate(128%);
      -webkit-backdrop-filter: blur(10px) saturate(128%);
    }
    .input::placeholder {
      color: var(--arcana-text-muted);
      opacity: 0.9;
    }

    .brand-focus:focus {
      border-color: var(--arcana-primary);
      box-shadow: 0 0 0 2px var(--arcana-primary);
    }

    .bubble-user {
      border: 1px solid rgba(var(--arcana-primary-rgb), 0.5);
      background: linear-gradient(160deg, rgba(var(--arcana-primary-rgb), 0.84), rgba(var(--arcana-primary-rgb), 0.64));
      color: var(--arcana-primary-text);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .bubble-assistant {
      border: 1px solid var(--arcana-glass-edge);
      background: linear-gradient(160deg, rgba(12, 10, 9, 0.72), rgba(12, 10, 9, 0.52));
      color: var(--arcana-text);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px) saturate(122%);
      -webkit-backdrop-filter: blur(8px) saturate(122%);
    }

    .link-brand { color: var(--arcana-primary); }

    .chip {
      border: 1px solid var(--arcana-glass-edge);
      color: var(--arcana-primary);
      background: linear-gradient(160deg, rgba(12, 10, 9, 0.58), rgba(12, 10, 9, 0.34));
      padding: 6px 10px;
      border-radius: 9999px;
      font-size: 12px;
      line-height: 16px;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px) saturate(122%);
      -webkit-backdrop-filter: blur(8px) saturate(122%);
      transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }
    .chip:hover {
      transform: translateY(-1px);
      background: linear-gradient(160deg, rgba(12, 10, 9, 0.68), rgba(12, 10, 9, 0.44));
      border-color: rgba(var(--arcana-primary-rgb), 0.5);
      box-shadow: 0 14px 22px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #bookingBackdrop {
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(3px) saturate(118%);
      -webkit-backdrop-filter: blur(3px) saturate(118%);
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-primary,
      .btn-ghost,
      .chip {
        transition: none;
      }
    }

    /* Generic Cliento widget styling */
    #cliento-booking .cb-nav-item.active {
      background: var(--cb-color-primary) !important;
      color: var(--arcana-primary-text) !important;
    }

    #cliento-booking .cb-day-header.today,
    #cliento-booking .cb-summary-table .cb-details,
    #cliento-booking .cb-slot strong {
      color: var(--cb-color-primary) !important;
    }

    #cliento-booking .cb-button,
    #cliento-booking button[type=button].cb-button,
    #cliento-booking button[type=submit].cb-button {
      background: var(--cb-color-primary) !important;
      border-color: var(--cb-color-primary) !important;
      color: var(--arcana-primary-text) !important;
      border-radius: 12px !important;
    }

    #cliento-booking .cb-checkbox.checked {
      background: var(--cb-color-primary) !important;
      border-color: var(--cb-color-primary) !important;
    }
  </style>

  <script src="/app.js"></script>
</body>
</html>
