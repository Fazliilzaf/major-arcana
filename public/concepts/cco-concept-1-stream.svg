<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="150" y1="20" x2="1460" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDD0C4"/>
      <stop offset="1" stop-color="#C8B3A3"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 180) rotate(90) scale(260 540)">
      <stop stop-color="white" stop-opacity="0.34"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF8F4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#EFE6DF" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8F5" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#F2E8E1" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C6356" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#4E3D35" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#F4ECE5" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="redDot" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E56E60"/>
      <stop offset="1" stop-color="#B3352B"/>
    </linearGradient>
    <linearGradient id="amberDot" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ECCB4B"/>
      <stop offset="1" stop-color="#D2A216"/>
    </linearGradient>
    <linearGradient id="greenDot" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#5DCE63"/>
      <stop offset="1" stop-color="#2C9B35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#6A4E38" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6A4E38" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6A4E38" flood-opacity="0.09"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6A4E38" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#shine)"/>

  <g filter="url(#shadow)">
    <rect x="34" y="24" width="1532" height="56" rx="26" fill="url(#glass)" stroke="#CCBAAC"/>
    <rect x="34" y="96" width="1532" height="52" rx="24" fill="url(#glass)" stroke="#CCBAAC"/>
  </g>
  <circle cx="64" cy="52" r="18" fill="#3B2E28" opacity="0.95"/>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="60" y="107" width="88" height="30" rx="15" fill="url(#card)" stroke="#D0C0B3"/>
    <text x="87" y="127" fill="#4E3D35">Inbox</text>
    <text x="174" y="127" fill="#5E4B41" opacity="0.72">Templates</text>
    <text x="282" y="127" fill="#5E4B41" opacity="0.72">Reviews</text>
    <text x="385" y="127" fill="#5E4B41" opacity="0.72">Settings</text>
  </g>
  <rect x="1354" y="34" width="172" height="34" rx="17" fill="url(#card)" stroke="#D0C0B3"/>
  <text x="1398" y="56" fill="#5E4B41" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="700">Egzona</text>

  <g filter="url(#shadow)">
    <rect x="36" y="176" width="1528" height="768" rx="34" fill="url(#panel)" stroke="#CDBCAE"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="64" y="210" width="232" height="694" rx="28" fill="url(#glass)" stroke="#D0C0B3"/>
    <rect x="320" y="210" width="876" height="694" rx="28" fill="url(#card)" stroke="#D0C0B3"/>
    <rect x="1126" y="242" width="392" height="612" rx="28" fill="url(#card)" stroke="#D0C0B3"/>
  </g>

  <text x="92" y="252" fill="#5E4B41" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="0.18em">RAIL</text>
  <text x="92" y="286" fill="#3B2E28" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Search</text>
  <rect x="92" y="304" width="176" height="38" rx="19" fill="url(#card)" stroke="#D2C2B5"/>
  <text x="114" y="328" fill="#A38F82" font-size="17" font-family="Inter, Arial, sans-serif">Customer or thread</text>
  <text x="92" y="386" fill="#5E4B41" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="0.18em">MAILBOXES</text>
  <rect x="92" y="406" width="176" height="38" rx="19" fill="url(#gloss)"/>
  <rect x="92" y="454" width="176" height="38" rx="19" fill="url(#card)" stroke="#D2C2B5"/>
  <rect x="92" y="502" width="176" height="38" rx="19" fill="url(#card)" stroke="#D2C2B5"/>
  <text x="116" y="431" fill="#FBF7F3" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700">All</text>
  <text x="116" y="479" fill="#5E4B41" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700">Egzona</text>
  <text x="116" y="527" fill="#5E4B41" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700">Follow-up</text>
  <text x="92" y="608" fill="#5E4B41" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="0.18em">FILTERS</text>
  <rect x="92" y="628" width="176" height="34" rx="17" fill="url(#card)" stroke="#D2C2B5"/>
  <rect x="92" y="670" width="176" height="34" rx="17" fill="url(#card)" stroke="#D2C2B5"/>
  <rect x="92" y="712" width="176" height="34" rx="17" fill="url(#card)" stroke="#D2C2B5"/>
  <text x="116" y="651" fill="#5E4B41" font-size="18" font-family="Inter, Arial, sans-serif">SLA risk</text>
  <text x="116" y="693" fill="#5E4B41" font-size="18" font-family="Inter, Arial, sans-serif">Waiting reply</text>
  <text x="116" y="735" fill="#5E4B41" font-size="18" font-family="Inter, Arial, sans-serif">New thread</text>

  <text x="352" y="252" fill="#3B2E28" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">The Stream</text>
  <text x="352" y="286" fill="#8A7668" font-size="18" font-family="Inter, Arial, sans-serif">The inbox is the product. Active dialogue slides in as a secondary layer.</text>

  <g>
    <rect x="352" y="332" width="812" height="104" rx="24" fill="url(#card)" stroke="#D0C0B3"/>
    <circle cx="382" cy="366" r="14" fill="url(#redDot)"/>
    <text x="412" y="362" fill="#3B2E28" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Customer 11</text>
    <text x="1046" y="362" fill="#7C6356" font-size="17" font-family="Inter, Arial, sans-serif">19 min</text>
    <text x="412" y="395" fill="#6B594D" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="600">Another thread reopened after colleague contact</text>
    <text x="412" y="422" fill="#8A7668" font-size="18" font-family="Inter, Arial, sans-serif">High urgency, split conversation, customer waiting in parallel channels.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="344" y="448" width="828" height="124" rx="28" fill="url(#card)" stroke="#8AB0EF" stroke-width="2"/>
  </g>
  <circle cx="382" cy="488" r="14" fill="url(#amberDot)"/>
  <text x="412" y="484" fill="#3B2E28" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="700">Customer 3</text>
  <text x="1034" y="484" fill="#7C6356" font-size="17" font-family="Inter, Arial, sans-serif">Today 14:27</text>
  <text x="412" y="519" fill="#6B594D" font-size="23" font-family="Inter, Arial, sans-serif" font-weight="600">Needs a warm follow-up after consultation</text>
  <text x="412" y="548" fill="#8A7668" font-size="18" font-family="Inter, Arial, sans-serif">The response drawer is open so the latest customer message and the draft are visible at once.</text>

  <g>
    <rect x="352" y="588" width="812" height="104" rx="24" fill="url(#card)" stroke="#D0C0B3"/>
    <circle cx="382" cy="622" r="14" fill="url(#greenDot)"/>
    <text x="412" y="618" fill="#3B2E28" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Customer 2</text>
    <text x="1046" y="618" fill="#7C6356" font-size="17" font-family="Inter, Arial, sans-serif">Tomorrow</text>
    <text x="412" y="651" fill="#6B594D" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="600">Calm dialogue but check-in window is opening</text>
    <text x="412" y="678" fill="#8A7668" font-size="18" font-family="Inter, Arial, sans-serif">No crisis. Surface it without stealing focus from urgent cases.</text>
  </g>

  <text x="1156" y="282" fill="#5E4B41" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="0.18em">ACTIVE THREAD</text>
  <text x="1156" y="320" fill="#3B2E28" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">Customer dialogue</text>
  <rect x="1156" y="346" width="332" height="90" rx="22" fill="url(#glass)" stroke="#D0C0B3"/>
  <text x="1180" y="382" fill="#3B2E28" font-size="24" font-family="Inter, Arial, sans-serif">I still want to continue, but I am unsure about timing.</text>
  <text x="1180" y="410" fill="#8A7668" font-size="17" font-family="Inter, Arial, sans-serif">Latest incoming mail shown without leaving the stream.</text>

  <rect x="1156" y="456" width="150" height="40" rx="20" fill="url(#gloss)"/>
  <rect x="1320" y="456" width="124" height="40" rx="20" fill="url(#card)" stroke="#D2C2B5"/>
  <text x="1196" y="482" fill="#FBF7F3" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Warm</text>
  <text x="1357" y="482" fill="#5E4B41" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Short</text>

  <rect x="1156" y="520" width="332" height="192" rx="26" fill="#FFFFFF" fill-opacity="0.76" stroke="#D0C0B3"/>
  <text x="1180" y="560" fill="#3B2E28" font-size="18" font-family="Inter, Arial, sans-serif">Hi,</text>
  <text x="1180" y="598" fill="#3B2E28" font-size="18" font-family="Inter, Arial, sans-serif">Thank you for your message. I am here and I want to help you move forward.</text>
  <text x="1180" y="632" fill="#3B2E28" font-size="18" font-family="Inter, Arial, sans-serif">If you answer in this thread, I will collect everything in one place.</text>
  <rect x="1156" y="734" width="120" height="42" rx="18" fill="url(#gloss)"/>
  <rect x="1290" y="734" width="132" height="42" rx="18" fill="url(#card)" stroke="#D2C2B5"/>
  <text x="1200" y="761" fill="#FBF7F3" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700">Reply</text>
  <text x="1330" y="761" fill="#5E4B41" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700">Schedule</text>

  <text x="68" y="968" fill="#7C6356" font-size="18" font-family="Inter, Arial, sans-serif">Concept 1  The Stream  Mail-client first, with a lighter response drawer instead of a fixed panel wall.</text>
</svg>
