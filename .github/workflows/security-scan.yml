name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Veckovis automatisk scan, måndagar 03:00 UTC
    - cron: '0 3 * * 1'

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit
      - name: Run npm audit (high+ allowed-fails)
        run: |
          # Tillåt low/moderate vulnerabilities men varna
          npm audit --audit-level=high || (echo "::warning::High-severity vulnerabilities found" && exit 1)

  dependency-check:
    name: Dependency outdated check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit
      - name: Check outdated packages
        continue-on-error: true
        run: npm outdated --json > outdated.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-report
          path: outdated.json

  unit-tests:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Run unit tests
        run: npm test
        env:
          OPENAI_API_KEY: dummy-for-ci

  csp-headers-check:
    name: Verifiera säkerhets-headers
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Start server + check headers
        run: |
          OPENAI_API_KEY=dummy-for-ci PORT=3000 node server.js &
          SERVER_PID=$!
          sleep 5
          curl -s -I http://localhost:3000/major-arcana-preview/ > headers.txt
          for header in "content-security-policy" "x-frame-options" "x-content-type-options" "referrer-policy" "permissions-policy"; do
            if grep -qi "$header" headers.txt; then
              echo "✓ $header"
            else
              echo "✗ $header SAKNAS"
              kill $SERVER_PID
              exit 1
            fi
          done
          kill $SERVER_PID
