services:
  - type: web
    name: arcana
    runtime: node
    plan: starter
    disk:
      name: arcana-state
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: ARCANA_AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ARCANA_DEFAULT_TENANT
        value: hair-tp-clinic
      - key: ARCANA_STATE_ROOT
        value: /var/data/arcana
      - key: ARCANA_BRAND_BY_HOST
        sync: false
      - key: ARCANA_OWNER_EMAIL
        sync: false
      - key: ARCANA_OWNER_PASSWORD
        sync: false
      - key: ARCANA_BOOTSTRAP_RESET_OWNER_PASSWORD
        value: false
      - key: ARCANA_BOOTSTRAP_RESET_OWNER_MFA
        value: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CLIENTO_ACCOUNT_IDS_HAIR_TP_CLINIC
        sync: false
      - key: CLIENTO_BOOKING_URL_HAIR_TP_CLINIC
        sync: false
      - key: CLIENTO_WIDGET_SRC_HAIR_TP_CLINIC
        value: https://cliento.com/widget-v3/cliento.js
      - key: CLIENTO_ACCOUNT_IDS_CURATIIO
        sync: false
      - key: CLIENTO_BOOKING_URL_CURATIIO
        sync: false
      - key: CLIENTO_WIDGET_SRC_CURATIIO
        value: https://cliento.com/widget-v3/cliento.js
      - key: ARCANA_BACKUP_RETENTION_MAX_FILES
        value: 12
      - key: ARCANA_BACKUP_RETENTION_MAX_AGE_DAYS
        value: 14
      - key: ARCANA_REPORT_RETENTION_MAX_FILES
        value: 20
      - key: ARCANA_REPORT_RETENTION_MAX_AGE_DAYS
        value: 14
      - key: ARCANA_STARTUP_AUTH_STORE_MAX_BYTES
        value: 12582912
      - key: ARCANA_STARTUP_MEMORY_STORE_MAX_BYTES
        value: 25165824
      - key: ARCANA_STARTUP_CAP_ANALYSIS_STORE_MAX_BYTES
        value: 33554432
      - key: ARCANA_STARTUP_TEMPLATE_STORE_MAX_BYTES
        value: 25165824
      - key: ARCANA_STARTUP_TENANT_CONFIG_STORE_MAX_BYTES
        value: 8388608
      - key: ARCANA_STARTUP_PATIENT_SIGNAL_STORE_MAX_BYTES
        value: 20971520
      - key: ARCANA_STARTUP_SLO_TICKET_STORE_MAX_BYTES
        value: 8388608
      - key: ARCANA_STARTUP_RELEASE_GOVERNANCE_STORE_MAX_BYTES
        value: 8388608
      - key: ARCANA_STARTUP_SECRET_ROTATION_STORE_MAX_BYTES
        value: 4194304
      - key: ARCANA_SCHEDULER_ENABLED
        value: true
      - key: ARCANA_SCHEDULER_REPORT_WINDOW_DAYS
        value: 14
      - key: ARCANA_SCHEDULER_REPORT_INTERVAL_HOURS
        value: 24
      - key: ARCANA_SCHEDULER_BACKUP_INTERVAL_HOURS
        value: 24
      - key: ARCANA_SCHEDULER_RESTORE_DRILL_INTERVAL_HOURS
        value: 168
      - key: ARCANA_SCHEDULER_ALERT_PROBE_INTERVAL_MINUTES
        value: 15
      - key: ARCANA_SCHEDULER_INCIDENT_AUTO_ESCALATION_ENABLED
        value: true
      - key: ARCANA_SCHEDULER_INCIDENT_AUTO_ESCALATION_LIMIT
        value: 25
      - key: ARCANA_SCHEDULER_INCIDENT_AUTO_ASSIGN_OWNER_ENABLED
        value: true
      - key: ARCANA_SCHEDULER_INCIDENT_AUTO_ASSIGN_OWNER_LIMIT
        value: 100
      - key: ARCANA_SCHEDULER_STARTUP_DELAY_SEC
        value: 8
      - key: ARCANA_SCHEDULER_JITTER_SEC
        value: 4
      - key: ARCANA_SCHEDULER_RUN_ON_STARTUP
        value: false
      - key: ARCANA_MONITOR_RESTORE_DRILL_MAX_AGE_DAYS
        value: 30
      - key: ARCANA_MONITOR_PILOT_REPORT_MAX_AGE_HOURS
        value: 36
      - key: ARCANA_METRICS_MAX_SAMPLES
        value: 5000
      - key: ARCANA_METRICS_SLOW_REQUEST_MS
        value: 1500
      - key: ARCANA_OBSERVABILITY_ALERT_MAX_ERROR_RATE_PCT
        value: 2.5
      - key: ARCANA_OBSERVABILITY_ALERT_MAX_P95_MS
        value: 1800
      - key: ARCANA_OBSERVABILITY_ALERT_MAX_SLOW_REQUESTS
        value: 25
      - key: ARCANA_PUBLIC_CHAT_BETA_ENABLED
        value: true
      - key: ARCANA_PUBLIC_CHAT_BETA_HEADER
        value: x-arcana-beta-key
      - key: ARCANA_PUBLIC_CHAT_BETA_KEY
        sync: false
      - key: ARCANA_PUBLIC_CHAT_BETA_ALLOW_HOSTS
        value: arcana.hairtpclinic.se,*.hairtpclinic.se,hairtpclinic.se,www.hairtpclinic.se
      - key: ARCANA_PUBLIC_CHAT_BETA_ALLOW_LOCALHOST
        value: true
      - key: ARCANA_ALERT_WEBHOOK_URL
        sync: false
      - key: ARCANA_ALERT_WEBHOOK_SECRET
        sync: false
      - key: ARCANA_ALERT_WEBHOOK_TIMEOUT_MS
        value: 4000
      - key: TRUST_PROXY
        value: true
