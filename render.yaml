services:
  - type: web
    name: arcana-cco
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ARCANA_AI_PROVIDER
        value: fallback
      - key: ARCANA_GRAPH_READ_ENABLED
        value: "false"
      - key: ARCANA_GRAPH_SEND_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
