services:
  - type: web
    name: arcana-cco
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    disk:
      name: arcana-cco-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ARCANA_STATE_ROOT
        value: /var/data
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ARCANA_AI_PROVIDER
        value: fallback
      - key: ARCANA_GRAPH_READ_ENABLED
        value: "true"
      - key: ARCANA_GRAPH_SEND_ENABLED
        value: "true"
      - key: ARCANA_GRAPH_TENANT_ID
        sync: false
      - key: ARCANA_GRAPH_CLIENT_ID
        sync: false
      - key: ARCANA_GRAPH_CLIENT_SECRET
        sync: false
      - key: ARCANA_GRAPH_USER_ID
        sync: false
      - key: ARCANA_GRAPH_FULL_TENANT
        value: "true"
      - key: ARCANA_GRAPH_USER_SCOPE
        value: all
      - key: ARCANA_GRAPH_READ_DEFAULT_ALLOWLIST
        sync: false
      - key: ARCANA_MAILBOX_ALLOWLIST
        sync: false
      - key: ARCANA_GRAPH_SEND_ALLOWLIST
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ARCANA_BOOTSTRAP_MAILBOX_BACKFILL
        value: "true"
      - key: ARCANA_BOOTSTRAP_MAILBOX_LOOKBACK_DAYS
        value: "90"
      - key: ARCANA_BOOTSTRAP_PREFERRED_MAILBOX
        value: contact@hairtpclinic.com
      - key: ARCANA_BOOTSTRAP_TENANT_ID
        value: hair-tp-clinic
      - key: ARCANA_BOOTSTRAP_DELAY_MS
        value: "5000"
